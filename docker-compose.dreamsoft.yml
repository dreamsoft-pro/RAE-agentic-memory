services:
  next-frontend:
    build:
      context: ./frontendnext_new
      args:
        - NEXT_PUBLIC_API_URL=http://localhost:8000
        - NEXT_PUBLIC_STATIC_URL=http://localhost:8080
    container_name: next-frontend
    restart: unless-stopped
    ports:
      - "3005:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
      - NEXT_PUBLIC_STATIC_URL=http://localhost:8080
      - API_URL=http://backend:80
    depends_on:
      - backend

  mysql:
    container_name: mysql
    image: mariadb:10.5.13
    restart: always
    environment:
      - MYSQL_ROOT_PASSWORD=dupa123
      - MYSQL_DATABASE=printworks
    ports:
      - "3306:3306"
    volumes:
      - ./database/data:/var/lib/mysql

  mongo:
    container_name: mongo
    image: mongo:4.2
    restart: always
    ports:
      - "27017:27017"

  static:
    image: httpd:alpine
    container_name: ds-static
    restart: always
    ports:
      - "8080:80"
    volumes:
      - ./data:/usr/local/apache2/htdocs/

  authapp:
    build: ./authApp
    container_name: authapp
    restart: always
    ports:
      - "2600:2600"
    volumes:
      - ./authApp:/app

  backend:
    build: ./backend
    container_name: backend
    restart: always
    ports:
      - "8000:80"
    environment:
      - PHINX_ENVIRONMENT=production
      - DB_HOST=mysql
      - DB_USER=root
      - DB_PASSWORD=dupa123
      - DB_NAME=printworks
    volumes:
      - ./backend:/var/www/app
      - ./data:/var/www/app/data
    depends_on:
      - mysql
