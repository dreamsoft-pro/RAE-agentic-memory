# RAE - Lite (Hardware Agnostic)
# No External DB dependencies (Uses SQLite + In-Memory Vectors)
# Ideal for Windows, Laptops, and Edge Devices

services:
  rae-lite:
    build:
      context: .
      args:
        - BASE_IMAGE=python:3.14-slim
        - INSTALL_ML=false
    container_name: rae-lite
    restart: always
    ports:
      - "8010:8000"
    environment:
      - RAE_PROFILE=lite
      - RAE_DB_MODE=init
      # SYSTEM 98.1: SQLite Fallback for Lite Profile
      - DATABASE_URL=sqlite+aiosqlite:///data/rae_lite.db
      - QDRANT_HOST=disabled
      - REDIS_HOST=disabled
    volumes:
      - ./data/lite:/app/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - rae-lite-network

networks:
  rae-lite-network:
    name: rae-lite-internal
