# RAE - Universal Orchestration (Production/Standard)
# Supports 'Core' (default) and 'Full' profiles

services:
  rae-am-api:
    image: rae-api:latest
    pull_policy: build
    build:
      context: .
      args:
        - BASE_IMAGE=python:3.14-slim
        - INSTALL_ML=false
    container_name: rae-am-api
    restart: always
    ports:
      - "8001:8000"
    env_file: .env
    depends_on:
      rae-am-postgres:
        condition: service_healthy
      rae-am-redis:
        condition: service_healthy
      rae-am-qdrant:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - rae-internal

  rae-am-worker:
    image: rae-api:latest
    pull_policy: build
    build:
      context: .
      args:
        - BASE_IMAGE=python:3.14-slim
        - INSTALL_ML=false
    container_name: rae-am-worker
    command: celery -A apps.memory_api.celery_app:celery_app worker --loglevel=info
    env_file: .env
    depends_on:
      rae-am-postgres:
        condition: service_healthy
      rae-am-redis:
        condition: service_healthy
      rae-am-qdrant:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "celery -A apps.memory_api.celery_app:celery_app inspect ping"]
      interval: 30s
      timeout: 15s
      retries: 3
      start_period: 60s
    networks:
      - rae-internal

  rae-am-beat:
    image: rae-api:latest
    pull_policy: build
    build:
      context: .
      args:
        - BASE_IMAGE=python:3.14-slim
        - INSTALL_ML=false
    container_name: rae-am-beat
    command: celery -A apps.memory_api.celery_app:celery_app beat --loglevel=info
    env_file: .env
    depends_on:
      rae-am-redis:
        condition: service_healthy
    networks:
      - rae-internal

  rae-am-reranker:
    pull_policy: build
    build:
      context: ./apps/reranker_service
    container_name: rae-am-reranker
    ports:
      - "8002:8001"
    environment:
      - MODEL_NAME=cross-encoder/ms-marco-TinyBERT-L-2-v2
    networks:
      - rae-internal

  rae-am-postgres:
    image: ankane/pgvector:latest
    container_name: rae-am-postgres
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-rae}
      - POSTGRES_USER=${POSTGRES_USER:-rae}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-rae_password}
    ports:
      - "5432:5432"
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rae -d rae"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - rae-internal

  rae-am-qdrant:
    image: qdrant/qdrant:latest
    container_name: rae-am-qdrant
    ports:
      - "6333:6333"
    volumes:
      - ./data/qdrant:/qdrant/storage
    networks:
      - rae-internal

  rae-am-redis:
    image: redis:7-alpine
    container_name: rae-am-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - rae-internal

networks:
  rae-internal:
    name: rae-internal
