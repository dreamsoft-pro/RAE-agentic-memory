# RAE-agentic-memory-agnostic-core
# Docker Compose Configuration - LOCAL STABLE (Laptop Bridge)

services:
  postgres:
    image: postgres:15-alpine
    container_name: rae-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: rae
      POSTGRES_PASSWORD: rae_password
      POSTGRES_DB: rae
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - rae-network

  redis:
    image: redis:7-alpine
    container_name: rae-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - rae-network

  qdrant:
    image: qdrant/qdrant:latest
    container_name: rae-qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      - rae-network

  rae-api-dev:
    image: rae-memory:latest
    container_name: rae-api-dev
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8001:8000"
    environment:
      - POSTGRES_USER=rae
      - POSTGRES_PASSWORD=rae_password
      - POSTGRES_DB=rae
      - POSTGRES_HOST=rae-postgres
      - REDIS_URL=redis://rae-redis:6379/0
      - QDRANT_HOST=rae-qdrant
      - RAE_API_KEY=test-key
      - RAE_DB_MODE=ignore
    volumes:
      - ./rae-core:/app/rae-core
      - ./apps:/app/apps
      - ./rae_adapters:/app/rae_adapters
      - ./alembic:/app/alembic
    networks:
      - rae-network

networks:
  rae-network:
    name: rae-agentic-memory-agnostic-core_rae-network
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  qdrant_data:
