services:
  rae-postgres:
    image: ankane/pgvector:latest
    container_name: rae-postgres
    restart: always
    environment:
      POSTGRES_DB: rae
      POSTGRES_USER: rae
      POSTGRES_PASSWORD: rae_password
    volumes:
      - rae_db_data:/var/lib/postgresql/data
    networks:
      - rae-internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rae -d rae"]
      interval: 5s
      timeout: 5s
      retries: 5

  rae-qdrant:
    image: qdrant/qdrant:latest
    container_name: rae-qdrant
    restart: always
    ports:
      - "6333:6333"
    volumes:
      - rae_qdrant_data:/qdrant/storage
    networks:
      - rae-internal

  rae-redis:
    image: redis:7-alpine
    container_name: rae-redis
    restart: always
    networks:
      - rae-internal
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  rae-api-dev:
    image: rae-memory:latest
    container_name: rae-api-dev
    restart: always
    ports:
      - "8001:8000"
    env_file:
      - .env
    volumes:
      - ./rae_adapters:/opt/venv/lib/python3.14/site-packages/rae_adapters
      - ./rae-core/rae_core:/opt/venv/lib/python3.14/site-packages/rae_core
    depends_on:
      rae-postgres:
        condition: service_healthy
      rae-redis:
        condition: service_healthy
    networks:
      - rae-internal
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/healthz/"]
      interval: 10s
      timeout: 5s
      retries: 5

  rae-worker:
    image: rae-memory:latest
    container_name: rae-worker
    restart: always
    env_file:
      - .env
    volumes:
      - ./rae_adapters:/opt/venv/lib/python3.14/site-packages/rae_adapters
      - ./rae-core/rae_core:/opt/venv/lib/python3.14/site-packages/rae_core
    depends_on:
      - rae-redis
    networks:
      - rae-internal

networks:
  rae-internal:
    external: true

volumes:
  rae_db_data:
  rae_qdrant_data:
