# RAE - Full Stack (Production/Standard)
# Supports GPU acceleration if available

services:
  rae-api:
    build:
      context: .
      args:
        - BASE_IMAGE=nvidia/cuda:12.4.1-base-ubuntu22.04 # Change to python:3.14-slim if no GPU
        - INSTALL_ML=true
    container_name: rae-api
    restart: always
    ports:
      - "8001:8000"
    env_file: .env
    depends_on:
      rae-postgres:
        condition: service_healthy
      rae-redis:
        condition: service_healthy
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    networks:
      - rae-network

  rae-worker:
    image: rae-api:latest
    container_name: rae-worker
    command: celery -A apps.memory_api.tasks worker --loglevel=info
    env_file: .env
    depends_on:
      - rae-redis
    networks:
      - rae-network

  rae-postgres:
    image: ankane/pgvector:latest
    container_name: rae-postgres
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-rae}
      - POSTGRES_USER=${POSTGRES_USER:-rae}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-rae_password}
    volumes:
      - rae_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rae -d rae"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - rae-network

  rae-qdrant:
    image: qdrant/qdrant:latest
    container_name: rae-qdrant
    ports:
      - "6333:6333"
    volumes:
      - rae_qdrant_data:/qdrant/storage
    networks:
      - rae-network

  rae-redis:
    image: redis:7-alpine
    container_name: rae-redis
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - rae-network

networks:
  rae-network:
    name: rae-internal

volumes:
  rae_db_data:
  rae_qdrant_data:
