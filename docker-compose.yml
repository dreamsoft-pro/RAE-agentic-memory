# RAE - Full Stack (Production/Standard)
# CPU Optimized (no GPU required)

services:
  rae-api:
    image: rae-api:latest
    build:
      context: .
      args:
        - BASE_IMAGE=python:3.14-slim
        - INSTALL_ML=false
    container_name: rae-api
    restart: always
    ports:
      - "8001:8000"
    env_file: .env
    depends_on:
      rae-postgres:
        condition: service_healthy
      rae-redis:
        condition: service_healthy
    networks:
      - rae-internal

  rae-worker:
    build:
      context: .
      args:
        - BASE_IMAGE=python:3.14-slim
        - INSTALL_ML=false
    image: rae-api:latest
    container_name: rae-worker
    command: celery -A apps.memory_api.celery_app:celery_app worker --loglevel=info
    env_file: .env
    depends_on:
      - rae-redis
    networks:
      - rae-internal

  rae-postgres:
    image: ankane/pgvector:latest
    container_name: rae-postgres
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-rae}
      - POSTGRES_USER=${POSTGRES_USER:-rae}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-rae_password}
    volumes:
      - rae_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rae -d rae"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - rae-internal

  rae-qdrant:
    image: qdrant/qdrant:latest
    container_name: rae-qdrant
    ports:
      - "6333:6333"
    volumes:
      - rae_qdrant_data:/qdrant/storage
    networks:
      - rae-internal

  rae-redis:
    image: redis:7-alpine
    container_name: rae-redis
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - rae-internal

networks:
  rae-internal:
    name: rae-internal

volumes:
  rae_db_data:
  rae_qdrant_data:
