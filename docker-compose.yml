# RAE-agentic-memory - FULL NETWORK REPAIR
services:
  postgres:
    image: postgres:15-alpine
    container_name: rae-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: rae
      POSTGRES_PASSWORD: rae_password
      POSTGRES_DB: rae
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      rae-network:
        aliases:
          - rae-postgres

  redis:
    image: redis:7-alpine
    container_name: rae-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      rae-network:
        aliases:
          - rae-redis

  qdrant:
    image: qdrant/qdrant:latest
    container_name: rae-qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      rae-network:
        aliases:
          - rae-qdrant

  ollama-dev:
    image: ollama/ollama:latest
    container_name: ollama-dev
    restart: unless-stopped
    ports:
      - "11435:11434"
    volumes:
      - ollama_data:/root/.ollama
    networks:
      rae-network:
        aliases:
          - ollama-dev

  rae-api-dev:
    image: rae-memory:latest
    container_name: rae-api-dev
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8001:8000"
    environment:
      - POSTGRES_USER=rae
      - POSTGRES_PASSWORD=rae_password
      - POSTGRES_DB=rae
      - POSTGRES_HOST=rae-postgres
      - REDIS_URL=redis://rae-redis:6379/0
      - QDRANT_HOST=rae-qdrant
      - RAE_API_KEY=test-key
      - RAE_DB_MODE=ignore
      - PYTHONPATH=/app:/app/rae_core
      - OLLAMA_API_URL=http://ollama-dev:11434
    volumes:
      - ./archive/projects_nested/rae-core/rae_core:/app/rae_core
      - ./rae_core/rae_core/models/contracts.py:/app/rae_core/models/contracts.py
      - ./apps:/app/apps
      - ./rae_adapters:/app/rae_adapters
      - ./alembic:/app/alembic
    networks:
      rae-network:
        aliases:
          - rae-api-dev
          - rae-api

  rae-oracle-ui:
    image: rae-oracle:latest
    container_name: rae-oracle-ui
    restart: unless-stopped
    ports:
      - "8506:8080"
    volumes:
      - ./rae_lite/ui/app.py:/app/main.py
    environment:
      - RAE_API_URL=http://smallai.printdisplay.pl/api
    networks:
      - rae-network
    depends_on:
      - rae-api-dev

networks:
  rae-network:
    name: rae-internal
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  qdrant_data:
  ollama_data:
