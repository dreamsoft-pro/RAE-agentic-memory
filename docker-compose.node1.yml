# RAE-Suite v4.5 - NODE 1 PRODUCTION STACK (CLEAN PORTS)
services:
  rae-api-dev:
    image: rae-memory:latest
    container_name: rae-api-node1
    restart: unless-stopped
    command: ["uvicorn", "apps.memory_api.main:app", "--host", "0.0.0.0", "--port", "8100"]
    ports:
      - "8100:8100"
    environment:
      - POSTGRES_USER=rae
      - POSTGRES_PASSWORD=rae_password
      - POSTGRES_DB=rae
      - POSTGRES_HOST=localhost
      - REDIS_URL=redis://localhost:6379/0
      - QDRANT_HOST=localhost
      - RAE_API_KEY=test-key
      - RAE_DB_MODE=migrate
      - PYTHONPATH=/app
      - OLLAMA_API_URL=http://localhost:11434
    network_mode: host
    volumes:
      - ./rae-core/rae_core:/app/rae_core
      - ./apps:/app/apps
      - ./rae_adapters:/app/rae_adapters
      - ./alembic:/app/alembic
      - ./models:/app/models

  rae-worker:
    image: rae-memory:latest
    container_name: rae-worker-node1
    command: bash -c "celery -A apps.memory_api.celery_app worker --loglevel=info"
    restart: unless-stopped
    environment:
      - PYTHONPATH=/app
      - POSTGRES_HOST=localhost
      - REDIS_URL=redis://localhost:6379/0
      - CELERY_BROKER_URL=redis://localhost:6379/0
      - OLLAMA_API_URL=http://localhost:11434
    network_mode: host
    volumes:
      - ./rae-core/rae_core:/app/rae_core
      - ./apps:/app/apps
      - ./rae_adapters:/app/rae_adapters
      - ./models:/app/models

  rae-mcp:
    image: rae-memory:latest
    container_name: rae-mcp-node1
    command: ["python3", "-m", "rae_mcp.server"]
    restart: unless-stopped
    environment:
      - RAE_API_URL=http://localhost:8100 # Point to the new safe port
      - RAE_API_KEY=test-key
      - RAE_TENANT_ID=53717286-fe94-4c8f-baf9-c4d2758eb672
      - RAE_PROJECT_ID=dreamsoft_factory
      - PYTHONPATH=/app:/app/integrations/mcp/src
    network_mode: host
    volumes:
      - ./integrations/mcp/src/rae_mcp:/app/rae_mcp
      - ./rae-core/rae_core:/app/rae_core
