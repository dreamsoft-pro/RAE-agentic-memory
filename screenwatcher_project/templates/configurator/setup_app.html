{% extends 'base.html' %}

{% block content %}
<h1>Configure Applications</h1>
<div class="row">
    <div class="col-md-4">
        <h2>Add New Application</h2>
        <form method="post" enctype="multipart/form-data">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit" class="btn btn-primary">Save</button>
        </form>
    </div>
    <div class="col-md-8">
        <h2>Existing Applications</h2>
        <ul class="list-group">
            {% for app in apps %}
                <li class="list-group-item d-flex justify-content-between align-items-center">
                    {{ app.name }}
                    <span>
                        <a href="{% url 'configurator:configure_app' app.id %}" class="btn btn-sm btn-secondary">Configure</a>
                    </span>
                </li>
            {% empty %}
                <li class="list-group-item">No applications configured yet.</li>
            {% endfor %}
        </ul>
    </div>
</div>
{% endblock %}
