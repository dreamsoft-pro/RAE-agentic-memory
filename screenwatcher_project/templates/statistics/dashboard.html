{% extends 'base.html' %}

{% block extra_head %}
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
{% endblock %}

{% block content %}
<h1>Statistics Dashboard</h1>

<div class="row">
    <div class="col-md-3">
        <h3>Select ROI</h3>
        <select id="roi-select" class="form-select">
            <option value="" disabled selected>-- Select ROI --</option>
            {% for roi in rois %}
                <option value="{{ roi.id }}">{{ roi.application.name }} - {{ roi.name }}</option>
            {% endfor %}
        </select>
    </div>
    <div class="col-md-9">
        <canvas id="roiChart" height="200"></canvas>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
    const ctx = document.getElementById('roiChart').getContext('2d');
    let chartInstance = null;
    const roiSelect = document.getElementById('roi-select');
    roiSelect.addEventListener('change', function () {
        const roiId = this.value;
        if (!roiId) return;
        fetch(`{% url 'statistics:roi-data-json' 0 %}`.replace('/0/', '/' + roiId + '/'))
            .then(response => response.json())
            .then(data => {
                const labels = data.map(item => item.timestamp);
                const values = data.map(item => {
                    // If value is an object (e.g. table), serialize it
                    return typeof item.value === 'object' ? JSON.stringify(item.value) : item.value;
                });
                // Destroy previous chart if exists
                if (chartInstance) {
                    chartInstance.destroy();
                }
                chartInstance = new Chart(ctx, {
                    type: 'line',
                    data: {
                        labels: labels,
                        datasets: [{
                            label: 'ROI Value',
                            data: values,
                            borderColor: 'rgba(54, 162, 235, 1)',
                            tension: 0.1,
                        }],
                    },
                    options: {
                        responsive: true,
                        scales: {
                            y: {
                                beginAtZero: false
                            }
                        }
                    }
                });
            });
    });
</script>
{% endblock %}
