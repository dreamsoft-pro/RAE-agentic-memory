version: "3"
services:

  proxy:
    image: 'jc21/nginx-proxy-manager:latest'
    restart: unless-stopped
    ports:
      - '80:80'
      - '443:443'
      - '81:81'
    volumes:
      - ./proxy/data:/data
      - ./letsencrypt:/etc/letsencrypt

  mongo:
    container_name: mongo
    image: mongo:4.2
    restart: on-failure
    ports:
      - 27017:27017
    volumes:
      - ./docker/mongo-import/mongo-backup:/home/mongo-backup
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: M0nG0f69b54
      MONGO_INITDB_DATABASE: admin
    healthcheck:
      test: ["CMD", "mongo", "--eval", "db.runCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 5

  mongo-express:
    container_name: mongo-express
    image: mongo-express
    links:
      - mongo
    depends_on:
      - proxy
      - mongo
    environment:
      ME_CONFIG_BASICAUTH_USERNAME: admin
      ME_CONFIG_BASICAUTH_PASSWORD: admin
      ME_CONFIG_MONGODB_ADMINUSERNAME: admin
      ME_CONFIG_MONGODB_ADMINPASSWORD: M0nG0f69b54
      ME_CONFIG_MONGODB_AUTH_DATABASE: admin
      ME_CONFIG_MONGODB_SERVER: mongo

  mysql:
    container_name: mysql
    image: mariadb:10.5.13
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: dupa123
      MYSQL_DATABASE: printworks
    command: --max-allowed-packet=1073741824 --general-log=true --general-log-file=query.log
    ports:
      - 3306:3306
    volumes:
      - ./database/data:/var/lib/mysql
      - ./database/dump:/tmp/dump

  phpmyadmin:
    container_name: phpmyadmin
    image: phpmyadmin/phpmyadmin
    links:
      - mysql
    depends_on:
      - proxy
      - mysql
    environment:
      PMA_ARBITRARY: 1
      PMA_USER: root
      PMA_PASSWORD: dupa123
      PMA_HOST: mysql
      PMA_PORT: 3306
      UPLOAD_LIMIT: 300M

  static:
    container_name: static
    image: ds-static
    build:
      context: ./static
      dockerfile: ./Dockerfile
    depends_on:
      - proxy
    volumes:
      - ./static/data:/var/www/app
    env_file:
      - ./static/.env

  authapp:
    container_name: authapp
    image: ds-authapp
    build:
      context: ./authApp
      dockerfile: ./Dockerfile
    links:
      - mongo
    depends_on:
      - proxy
      - mongo
    env_file:
      - ./authApp/.env

  manager:
    container_name: manager
    image: ds-manager
    build:
      context: ./manager
      dockerfile: ./Dockerfile
    depends_on:
      - proxy
    env_file:
      - ./manager/.env

  editor-backend:
    container_name: editor-backend
    image: ds-editor-backend
    build:
      context: ./editor-backend
      dockerfile: ./Dockerfile
    depends_on:
      - proxy
      - mongo
    env_file:
      - ./editor-backend/.env

  editor:
    container_name: editor
    image: ds-editor
    build:
      context: ./editor
      dockerfile: ./Dockerfile
    depends_on:
      - proxy
    env_file:
      - ./editor/.env

  backend:
    container_name: backend
    image: ds-backend-dev
    build:
      context: ./backend
      dockerfile: ./Dockerfile-dev
    depends_on:
      - proxy
      - mysql
    networks:
      default:
        - ipv4_address: 172.18.0.12
    ports:
      - 9595:9595
    volumes:
      - ./data:/var/www/app/data
      - ./backend/app:/var/www/app/app
      - ./backend/controllers:/var/www/app/controllers
      - ./backend/models:/var/www/app/models
      - ./backend/vendor:/var/www/app/vendor
      - ./backend/libs:/var/www/app/libs
      - ./backend/phinx:/var/www/app/phinx
    env_file:
      - ./backend/.env

  frontend:
    container_name: frontend
    image: ds-frontend-dev
    build:
      context: ./frontend
      dockerfile: ./Dockerfile-dev
    depends_on:
      - proxy
    env_file:
      - ./frontend/.env
    volumes:
      - ./data/templates/default:/app/.default
      - ./data/35/routing:/app/routing
      - ./frontend/app/:/app/app/
      - ./frontend/index.html:/app/index.html
    command:
      - 'grunt serve'
    ports:
      - 35729:35729
