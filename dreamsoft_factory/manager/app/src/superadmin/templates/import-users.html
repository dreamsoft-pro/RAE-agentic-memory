<div class="row">
    <div class="col-lg-7 col-md-12">
        <div class="portlet light">
            <div class="portlet-title">
                <div class="caption">
                    <i class="fa icon-settings"></i> {{ 'import' | translate }} {{ 'users' | translate }}
                </div>

            </div>
            <div class="portlet-body">

                <form class="form-horizontal" role="form" ng-submit="importUsers()">

                    <div class="modal-body">
                        <div class="form-body">
                            <div class="form-group">
                                <label class="col-md-3 control-label">{{ 'upload_file' | translate }} .xls</label>
                                <div class="col-md-9">
                                    <input nv-file-select uploader="uploader" type="file" class="form-control" placeholder="">
                                </div>
                            </div>
                            <div class="form-group">
                                <label class="col-md-3 control-label">{{ 'type' | translate }}</label>
                                <div class="col-md-9">

                                    <select class="form-control"
                                            ng-model="import.type"
                                            ng-options="t as t for t in importTypes"></select>

                                </div>
                            </div>
                        </div>

                    </div>
                    <div class="modal-footer">
                        <button type="submit" class="btn btn-success"><i class="fa fa-plus"></i>
                            {{ 'submit' | translate }}
                        </button>
                    </div>

                </form>

            </div>
        </div>
    </div>
    <div class="col-lg-5 visible-lg">
        <div faq-accordion="superadmin.importUsers" ></div>
    </div>
</div>
