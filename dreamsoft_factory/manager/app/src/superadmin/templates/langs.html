<div ui-view="lang-settings"></div>

<div class="row">
  <div class="col-md-12">
    <div class="portlet light">
      <div class="portlet-title">
        <div class="caption">
          <i class="fa fa-edit"></i>Langs
        </div>
        <!--  -->
      </div>
      <div class="portlet-body">
        <div class="overflowContainer">
          <table class="table table-striped table-hover">
            <thead>
              <tr role="row" class="heading">
                <th>#</th>
                <th>key</th>
                <th>value</th>
                <th>lang</th>
                <th>Create</th>
                <th class="text-right">Actions</th>
              </tr>
              <tr role="row" class="filter">
                <td>
                </td>
                <td>
                  <input type="text" class="form-control form-filter input-sm" placeholder="{{ 'key' | translate }}" ng-model="filterData.key" ng-change="search()">
                </td>
                <td>
                  <input type="text" class="form-control form-filter input-sm" placeholder="{{ 'value' | translate }}" ng-model="filterData.value" ng-change="search()">
                </td>
                <td>
                  <select  class="form-control form-filter input-sm" ng-model="filterData.lang" ng-change="search()" ng-options="lang.code as lang.name for (key, lang) in languages">
                    <option value="">{{ 'all' |translate }}</option>
                  </select>
                </td>
                <td></td>
                <td></td>
              </tr>
            </thead>
            <tbody>
              <tr ng-repeat="lang in filterLangs | offset: (pagination.currentPage-1) * pagination.perPage | limitTo: pagination.perPage ">
                <td>{{ lang.ID }}</td>
                <td>{{ lang.key }}</td>
                <td>{{ lang.value }}</td>
                <td>{{ lang.lang }}</td>
                <td>{{ lang.create }}</td>
                <td class="text-right">
                  <a class="edit" href="javascript:;" ng-click="edit(lang)">Edit</a>
                  <a class="edit" href="javascript:;" ng-confirm-click="remove(lang.ID)">Delete</a>
                </td>
              </tr>
            </tbody>
          </table>
        </div>
        <pagination total-items="filterLangs.length" ng-model="pagination.currentPage" ng-click="pagination.setPage(pagination.currentPage)" class="pagination-sm" max-size="10" boundary-links="true" items-per-page="pagination.perPage"></pagination>
        
        <div class="row">
          <div class="col-md-12">
            
            <div class="portlet light">
              <div class="portlet-title">
                <div class="caption">
                  <i class="fa fa-gift"></i> Add lang
                </div>
              </div>
              <div class="portlet-body form">
                <form class="form-horizontal" role="form" ng-submit="add()">
                  <div class="form-body">
                    
                    <div class="form-group">
                      <label class="col-md-3 control-label">{{ 'key' | translate }}</label>
                      <div class="col-md-9">
                        <input ng-model="form.key" type="text" class="form-control" placeholder="{{ 'key' | translate }}">
                      </div>
                    </div>
                    <div class="form-group">
                      <label class="col-md-3 control-label">{{ 'value' | translate }}</label>
                      <div class="col-md-9">
                        <input ng-model="form.value" type="text" class="form-control" placeholder="{{ 'value' | translate }}">
                      </div>
                    </div>
                    <div class="form-group">
                      <label class="col-md-3 control-label">{{ 'lang' | translate }}</label>
                      <div class="col-md-9">
                        <select class="form-control"  ng-model="form.lang" ng-options="each.code as each.name for each in langlist"></select>
                      </div>
                    </div>
                  </div>
                  <div class="form-actions">
                    <div class="row">
                      <div class="col-md-offset-3 col-md-9">
                        <button type="submit" class="btn btn-success"><i class="fa fa-plus"></i> {{ 'add' | translate }}</button>
                        <button ng-click="form = {}" type="button" class="btn red-sunglo">{{ 'cancel' | translate }}</button>
                      </div>
                    </div>
                  </div>
                </form>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<div ui-view="lang-export-import"></div>

<div ui-view="lang-empty"></div>
