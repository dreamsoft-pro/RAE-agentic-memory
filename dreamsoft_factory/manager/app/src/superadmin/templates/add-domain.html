<div class="row">
  <div class="col-lg-7 col-md-12">
    <div class="portlet light">
      <div class="portlet-title">
        <div class="caption">
          <i class="fa icon-settings"></i> {{ 'new_domain' | translate }}
        </div>

      </div>
      <div class="portlet-body">

        <form class="form-horizontal" role="form" ng-submit="saveDomain()">
          <div class="form-body">
            
            <div class="form-group">
              <label class="col-md-3 control-label">{{ 'domain_name' | translate }}</label>
              <div class="col-md-9">
                <input ng-model="form.domainName" maxlength="255" type="text" class="form-control" placeholder="{{ 'domain_name' | translate }}">
              </div>
            </div>

          </div>

          <div class="form-actions">
            <div class="row">
              <div class="col-md-offset-3 col-md-9">
                <button type="submit" class="btn btn-success"><i class="fa fa-plus"></i> {{ 'add' | translate }}</button>
                <button ng-click="form = _.clone(currentDomain)" type="button" class="btn red-sunglo">{{ 'cancel' | translate }}</button>
              </div>
            </div>
          </div>

        </form>

      </div>
    </div>
  </div>
  <div class="col-lg-5 visible-lg">
    <div faq-accordion="superadmin.addDomain" ></div>
  </div>
</div>
