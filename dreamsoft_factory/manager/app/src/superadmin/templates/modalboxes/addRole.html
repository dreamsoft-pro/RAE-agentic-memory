<div class="modal-header">
  <h3 class="modal-title">{{ editMode ? 'Edit role' : 'Add role'}}</h3>
</div>
<div class="modal-body" >
  <div class="row">
    <div class="col-md-12">

      <form class="form-horizontal" role="form">
        <div class="form-group">
          <label for="form_name" class="col-sm-2 control-label">Name</label>
          <div class="col-sm-10">
            <input type="text" class="form-control" id="form_name" placeholder="Name" ng-model="form.name">
          </div>
        </div>
        <div class="form-group">
          <label for="form_controller" class="col-sm-2 control-label">Description</label>
          <div class="col-sm-10">
            <input type="text" class="form-control" id="form_controller" placeholder="Description" ng-model="form.desc">
          </div>
        </div>
      </form>

    </div>
  </div>
</div>
<div class="modal-footer">
  <button class="btn btn-primary" ng-click="ok()">OK</button>
  <button class="btn btn-warning" ng-click="$dismiss()">Cancel</button>
</div>
