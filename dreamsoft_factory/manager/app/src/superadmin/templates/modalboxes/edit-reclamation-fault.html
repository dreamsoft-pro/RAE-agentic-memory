<div class="modal-header">
    <h3 class="modal-title">Edit mail type</h3>
</div>
<form class="form-horizontal" role="form" ng-submit="save()">
    <div class="modal-body" >
        <div class="row">
            <div class="col-md-12">
                <div class="form-body">

                    <div class="form-group">
                        <label class="col-md-3 control-label">{{ 'key' | translate }}</label>
                        <div class="col-md-9">
                            <input ng-model="form.key" type="text" class="form-control"
                                   placeholder="{{ 'key' | translate }}">
                        </div>
                    </div>

                    <div class="form-group">
                        <label class="col-md-3 control-label">{{ 'description' | translate }}</label>
                        <div class="col-md-9">
                                                <textarea placeholder="{{ showLang }}" class="form-control" ng-repeat="lang in languages"
                                                          ng-show="showLang == lang.code" ng-model="form.descriptions[lang.code].name" ></textarea>
                            <select class="form-control" ng-init="showLang = currentLang.code"
                                    ng-model="showLang" ng-options="each.code as each.name for (key, each) in languages"></select>
                        </div>
                    </div>

                </div>
            </div>
        </div>
    </div>
    <div class="modal-footer">
        <button class="btn btn-warning" type="button" ng-click="$dismiss()">{{ 'cancel' | translate }}</button>
        <button class="btn btn-primary">{{ 'save' | translate }}</button>
    </div>
</form>
