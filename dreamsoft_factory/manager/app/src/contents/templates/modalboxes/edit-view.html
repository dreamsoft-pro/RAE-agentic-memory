<div class="modal-header">
  <h3 class="modal-title">{{ 'edit' | translate }} {{view.name}}</h3>
</div>
<form class="form-horizontal" role="form" ng-submit="ok()">
  <div class="modal-body">
    <div class="form-body">
      <!-- <div class="form-group">
        <label class="col-md-3 control-label">{{ 'replace' | translate }}</label>
        <div class="col-md-9">
          <select ng-model="form.replaceID" type="text" class="form-control" ng-options="replace.ID as replace.name for replace in replaces">
            <option value="">{{ 'none' | translate }}</option>
          </select>
        </div>
      </div> -->
    </div>
    <div class="form-body">
      <div class="form-group" ng-if="!view.replaceID">
        <label class="col-md-3 control-label">{{ 'name' | translate }}</label>
        <div class="col-md-9">
          <input ng-model="form.name" type="text" class="form-control" placeholder="">
        </div>
      </div>
      <div class="form-group">
        <label class="col-md-3 control-label">{{ 'controller' | translate }}</label>
        <div class="col-md-9">
          <input ng-model="form.controller" type="text" class="form-control" placeholder="{{ 'controller' | translate }}">
        </div>
      </div>
      <div class="form-group">
        <label class="col-md-3 control-label"></label>
        <div class="col-md-9">
          <div class="checkbox-list">
            <label>
              <div class="checker">
                <span ng-class="{checked: !!parseInt(form.isMain)}">
                  <input ng-model="form.isMain" ng-true-value="1" ng-false-value="0" type="checkbox">
                </span>
              </div>
              {{ 'overwrite' | translate }}
            </label>
          </div>
        </div>
      </div>
    </div>
    
  </div>
  <div class="modal-footer">
    <button class="btn red-sunglo" type="button" ng-click="$dismiss()">{{ 'cancel' | translate }}</button>
    <button class="btn btn-success"><i class="fa fa-check"></i> {{ 'save' | translate }}</button>
  </div>
</form>
