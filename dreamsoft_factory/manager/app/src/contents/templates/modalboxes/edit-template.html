<div class="portlet light">
    <div class="portlet-title">
        <div class="caption">
            <i class="fa fa-male"></i> {{ 'select_template' | translate }}
        </div>
    </div>
    <div class="portlet-body">
        <form class="form-horizontal" role="form" ng-submit="add()">
            <div class="form-body">
                <div class="form-group">
                    <label class="col-md-3 control-label">{{ 'template' | translate }}</label>
                    <div class="col-md-9">
                        <select ng-model="form.templateIndex" type="text" class="form-control"
                                ng-options="templates.indexOf(template) as template.name group by template.ownName for template in templates">
                            <option value="">{{ 'none' | translate }}</option>
                        </select>
                    </div>
                </div>
                <div class="form-actions">
                    <div class="row">
                        <div class="col-md-offset-3 col-md-9">
                            <button type="submit" class="btn btn-success"><i class="fa fa-check"></i> {{ 'save' | translate }}
                            </button>
                            <button ng-click="$dismiss()" type="button" class="btn red-sunglo">{{ 'cancel' | translate }}
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </form>
    </div>
</div>
