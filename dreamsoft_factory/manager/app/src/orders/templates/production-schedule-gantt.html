<style>
    .baseline {
        position: absolute;
        border-radius: 2px;
        opacity: 0.6;
        margin-top: -7px;
        height: 12px;
        background: #ffd180;
        border: 1px solid rgb(255, 153, 0);
    }

    /* move task lines upper */
    .gantt_task_line,
    .gantt_line_wrapper {
        margin-top: -9px;
    }

    .gantt_side_content {
        margin-bottom: 7px;
    }

    .gantt_task_link .gantt_link_arrow {
        margin-top: -12px
    }

    .gantt_side_content.gantt_right {
        bottom: 0;
    }

    .yellow .gantt_cell,
    .odd.yellow .gantt_cell,
    .yellow .gantt_task_cell,
    .odd.yellow .gantt_task_cell {
        background-color: #fdece0;
    }

    .green .gantt_cell,
    .odd.green .gantt_cell,
    .green .gantt_task_cell,
    .odd.green .gantt_task_cell {
        background-color: #BEE4BE;
    }
</style>
<div class="row">
    <div class="col-md-12">
        <div class="form-body">
            <div class="portlet light">
                <div class="portlet-title">
                    <div class="caption">
                        {{ 'production_schedule_gantt' | translate }}<br>
                    </div>
                    <div class="tools" style="text-align: right;">
                        <well class="btn-sm">
                            {{ 'number_of_products' | translate }}: <span class="badge">{{ dpProducts.totalItems
                                }}</span>
                        </well>
                        <select class="btn-default input-sm" ng-model="showRows"
                            ng-change="dpProducts.setRows(showRows)"
                            ng-options="each for (null, each) in [10,25,50,100]"></select>
                        <button ng-click="dpProducts.clearCache()" class="btn btn-primary btn-sm">
                            <i class="fa fa-refresh"></i> {{ 'refresh' | translate }}
                        </button>
                        <button button-faq-accordion="productionPath.schedule-gantt"></button>

                        <a class="btn btn-primary btn-sm" style="height: auto;" ui-sref="production-schedule">
                            <i class="fa fa-list"></i> {{ 'change_to_table_view' | translate }}
                        </a>
                    </div>
                </div>
                <div class="portlet-body">
                    <div class="overflowContainer">
                        <div id="gantt_here" style='width:100%; height: 50vh;'></div>
                    </div>
                </div>
            </div>
        </div>


    </div>
</div>
