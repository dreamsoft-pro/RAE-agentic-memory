<div class="modal-header">
    <h3 class="modal-title">{{ 'export' | translate }}</h3>
</div>

<form class="form-horizontal" role="form" ng-submit="ok()">

  <div class="modal-body">
    <a href="{{apiUrl}}{{exportPath}}" target="_blank">Link do pliku</a>
    
  </div>
  <div class="modal-footer">
    <button class="btn red-sunglo" type="button" ng-click="$dismiss()">{{ 'close' | translate }}</button>
  </div>

</form>
