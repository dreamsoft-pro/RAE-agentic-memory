<div class="modal-header">
    <h3 class="modal-title">{{ 'workplaces' | translate }}: {{ task.name }} </h3>
</div>
<div class="modal-body">
    <div class="overflowContainer">
        <div style="display: flex; flex-flow: row wrap; justify-content: space-around;">
            <button ng-repeat="workplace in workplaces" style="margin-top: 10px; margin-right: 20px; font-weight: 600;" class="btn btn-lg" type="button" ng-click="changeToWorkplace(workplace)">{{ workplace.name }}</button>
        </div>
    </div>
</div>
<div class="modal-footer">
    <button class="btn red-sunglo" type="button" ng-click="$dismiss()">{{ 'close' | translate }}</button>
</div>
