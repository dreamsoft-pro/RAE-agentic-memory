<div class="modal-header">
    <h3 class="modal-title">{{ 'pauses' | translate }}: {{ task.name }} </h3>
</div>
<div class="modal-body">
    <div class="overflowContainer">
        <div style="display: flex; flex-flow: row wrap; justify-content: space-around;">
            <button ng-repeat="pause in pauses" style="margin-top: 10px; margin-right: 20px; font-weight: 600; background-color: {{pause.color}};" class="btn btn-lg" type="button" ng-click="changeStatePause(task, pause, null)" ng-disabled="task.finished">{{ pause.name }}</button>
        </div>
        <hr>
        <textarea style="width: 100%; height: 100px;" placeholder="{{ 'pause_reason' | translate }}" ng-model="customPause"></textarea>
        <br><button style="margin-top: 20px; font-weight: 600" class="btn btn-success btn-block btn-submit" type="button" ng-click="changeStatePause(task, null, customPause)" ng-disabled="task.finished">{{ 'custom_pause' | translate }}</button>
    </div>
</div>
<div class="modal-footer">
    <button class="btn red-sunglo" type="button" ng-click="$dismiss()">{{ 'close' | translate }}</button>
</div>
