<div class="modal-header">
  <h3 class="modal-title">{{ 'status' | translate }} {{ status.name }}</h3>
</div>
<div class="modal-body" >
  <div class="row">
    <div class="col-md-12">

      <form class="form-horizontal" role="form">
        <div class="form-group">
              <label class="col-md-3 control-label">{{ 'lang_name' | translate }}</label>
              <div class="col-md-9">
                <input ng-repeat="lang in languages" ng-show="nameLang == lang.code" ng-model="form.langs[lang.code]" type="text" class="form-control" placeholder="{{lang.code}}" />
	              <select class="form-control" ng-init="nameLang = currentLang.code" ng-model="nameLang" ng-options="each.code as each.name for (key, each) in languages"></select>
	            </div>
	          </div>

        <div class="form-group">
          <label class="col-md-3 control-label"></label>
          <div class="col-md-9">
            <div class="checkbox-list">
              <label>
              <div class="checker"><span ng-class="{checked: form.active}"><input ng-model="form.active" type="checkbox"></span></div>{{ 'active' | translate }}</label>
            </div>
          </div>
        </div>
      </form>

    </div>
  </div>
</div>
<div class="modal-footer">
  <button class="btn red-sunglo" ng-click="$dismiss()">{{ 'cancel' | translate }}</button>
  <button class="btn btn-success" ng-click="ok()">{{ 'submit' | translate }}</button>
</div>
