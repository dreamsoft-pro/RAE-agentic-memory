<div class="row">
    <div class="col-lg-7 col-md-12">
        <div class="portlet light">
            <div class="portlet-title">
                <div class="caption">
                    <i class="fa icon-bubbles"></i> {{ 'language_settings' | translate }}
                </div>

                <div class="tools hidden-lg">
                    <button button-faq-accordion="shop.langSettings"></button>
                </div>

            </div>
            <div class="portlet-body">

                <div class="overflowContainer">
                    <table class="table table-striped table-hover">
                        <thead>
                        <tr role="row" class="heading">
                            <th>{{ 'code' | translate }}</th>
                            <th>{{ 'name' | translate }}</th>
                            <th>{{ 'default' | translate }}</th>
                            <th>{{ 'active' | translate }}</th>
                            <th>{{ 'actions' | translate }}</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr ng-repeat="lang in langlist">
                            <td>
                                {{ lang.code }}
                            </td>
                            <td>
                                {{ lang.name }}
                            </td>
                            <td>
                  <span class="btn blue-stripe btn-xs"
                        ng-class="{'red-sunglo-stripe': !lang.default}">
                  {{ !!lang.default ? 'yes' : 'no' | translate }}
                  </span>
                            </td>
                            <td>
                  <span class="btn blue-stripe btn-xs"
                        ng-class="{'red-sunglo-stripe': !lang.active}">
                  {{ !!lang.active ? 'yes' : 'no' | translate }}
                  </span>
                            </td>
                            <td class="text-left">
                                <button ng-click="edit(lang)"
                                        data-toggle="tooltip" data-container="body" tooltip="{{ 'edit' | translate }}"
                                        class="btn blue-hoki btn-xs">
                                    <span class="glyphicon glyphicon-edit"></span>
                                </button>
                                <button ng-confirm-click="remove(lang.ID)"
                                        data-toggle="tooltip" data-container="body" tooltip="{{ 'delete' | translate }}"
                                        class="btn red-sunglo btn-xs">
                                    <span class="glyphicon glyphicon-remove"></span>
                                </button>
                            </td>
                        </tr>
                        </tbody>
                    </table>
                </div>
                <form class="form-horizontal" role="form" ng-submit="add()">
                    <div class="form-body">
                        <div class="form-group">
                            <label class="col-md-3 control-label">{{ 'add_language' | translate }}</label>
                            <div class="col-md-9">
                                <select class="form-control" ng-model="form.code"
                                        ng-options="each.code as each.name for (key, each) in activeRootLanguages">
                                    <option value="">{{ 'select' | translate }}</option>
                                </select>
                            </div>
                        </div>
                        <div class="form-actions">
                            <div class="row">
                                <div class="col-md-offset-3 col-md-9">
                                    <button type="submit" class="btn btn-success"><i class="fa fa-plus"></i> {{ 'add' |
                                        translate }}
                                    </button>
                                    <button ng-click="reset()" type="button" class="btn red-sunglo">{{ 'cancel' |
                                        translate }}
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>
                </form>
            </div>
        </div>
    </div>
    <div class="col-lg-5 visible-lg">
        <div faq-accordion="shop.langSettings"></div>
    </div>
</div>
