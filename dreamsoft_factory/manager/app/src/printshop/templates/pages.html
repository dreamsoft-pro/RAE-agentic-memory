<div ui-view="productMenu"></div>
<div class="row">
  <div class="col-lg-7 col-md-12">
    <div class="portlet light">
      <div class="portlet-title">
        <div class="caption">
          <i class="fa fa-copy"></i> {{ 'pages' | translate }}
        </div>
       
        <div class="tools hidden-lg">
          <button button-faq-accordion="printshop.pages"></button>
          <a href="javascript:;" ng-click="refreshPages()" class="reload">
          </a>
        </div>

      </div>
      <div class="portlet-body">
      <div class="overflowContainer">
        <table class="table table-striped table-hover"
                  ng-if="!rangePages && pages.length">
            <thead>
              <tr role="row" class="heading">
                <th>#</th>
                <th>{{ 'number_of_pages' | translate }}</th>
                <th></th>
              </tr>
            </thead>
            <tbody>
              <tr ng-repeat="page in pages |orderBy: 'pages'">
                <td>
                  {{ page.ID }}
                </td>
                <td>
                  {{ page.pages }}
                </td>
                <td>
                  <button ng-confirm-click="remove(page)"
                  data-toggle="tooltip" data-container="body" tooltip="{{ 'delete' | translate }}"
                  class="btn red-sunglo btn-xs">
                  <span class="glyphicon glyphicon-remove"></span>
                  </button>
                </td>
              </tr>
            </tbody>
          </table>
        </div>

        <div class="jumbotron" ng-if="rangePages">
          <h3>{{ 'range_pages' | translate }}</h3>
          <form class="form-horizontal" role="form">
            <div class="form-group">
              <label class="col-sm-2 control-label">{{ 'minimum_number_of_pages'  | translate}}
              </label>
              <div class="col-sm-10">
                <p class="form-control-static">{{pages.minPages}}</p>
              </div>
            </div>
            <div class="form-group">
              <label class="col-sm-2 control-label">{{ 'maximum_number_of_pages' | translate }}
              <div class="col-sm-10">
                <p class="form-control-static">{{pages.maxPages}}</p>
              </div>
            </div>
            <div class="form-group">
              <label class="col-sm-2 control-label">{{ 'step' | translate }}</label>
              <div class="col-sm-10">
                <p class="form-control-static">{{pages.step}}</p>
              </div>
            </div>
            <div class="form-group">
              <label class="col-sm-2 control-label">{{ 'formats_given_in_spreads' | translate }}</label>
              <div class="col-sm-10">
                <p class="form-control-static">
                <span class="btn blue-stripe btn-xs"
                ng-class="{'red-sunglo-stripe': !parseInt(pages.doublePage)}">
                {{parseInt(pages.doublePage) ? 'yes' : 'no' | translate }}
                </span>
                </p>
              </div>
            </div>
            <button data-ng-confirm-click="remove(pages)"
            data-toggle="tooltip" data-container="body" tooltip="{{ 'delete' | translate }}"
            class="btn red-sunglo btn-xs">
            {{ 'delete' | translate }}
            </button>
          </form>
        </div>

        <div class="form-group">
          <label class="col-md-3 control-label"></label>
          <div class="col-md-9">
            <div class="checkbox-list">
              <label>
                <div class="checker"><span ng-class="{checked: similarPage}"><input ng-model="similarPage" ng-change="setSimilarPage()" type="checkbox"></span></div>{{ 'all_pages_same' | translate }}
              </label>
            </div>
          </div>
        </div>


        <div class="row">
          <div class="col-md-12">
            
            <div class="portlet light">
              <div class="portlet-title">
                <div class="caption font-green-haze col-md-3 text-right">
                     {{ 'add_new_fem' | translate }}
                </div>
              </div>
              <div class="portlet-body form">
                <form class="form-horizontal" role="form" ng-submit="add(form)">
                  <div class="form-body">
                    <div class="form-group">
                      <label class="col-md-3 control-label"></label>
                      <div class="col-md-9">
                        <div class="checkbox-list">
                          <label>
                            <div class="checker"><span ng-class="{checked: form.range}"><input ng-model="form.range" type="checkbox"></span></div>{{ 'range_pages' | translate }}
                          </label>
                        </div>
                      </div>
                    </div>
                    
                    <div class="form-group" ng-if="!form.range">
                      <label class="col-md-3 control-label">{{ 'pages' | translate }}</label>
                      <div class="col-md-9">
                        <input ng-model="form.pages" type="text" class="form-control" placeholder="{{ 'pages' | translate }}" required>
                      </div>
                    </div>
                    <div class="form-group" ng-if="form.range">
                      <label class="col-md-3 control-label">{{ 'minimum_number_of_pages' | translate }}</label>
                      <div class="col-md-9">
                        <input ng-model="form.minPages" type="text" class="form-control" placeholder="{{ 'minimum_number_of_pages' | translate }}">
                      </div>
                    </div>
                    <div class="form-group" ng-if="form.range">
                      <label class="col-md-3 control-label">{{ 'maximum_number_of_pages' | translate }}</label>
                      <div class="col-md-9">
                        <input ng-model="form.maxPages" type="text" class="form-control" placeholder="{{ 'maximum_number_of_pages' | translate }}">
                      </div>
                    </div>
                    <div class="form-group" ng-if="form.range">
                      <label class="col-md-3 control-label">{{ 'step' | translate }}</label>
                      <div class="col-md-9">
                        <input ng-model="form.step" type="text" class="form-control" placeholder="{{ 'number_of_pages_added' | translate }}">
                      </div>
                    </div>
                    <div class="form-group" ng-if="form.range">
                      <label class="col-md-3 control-label"></label>
                      <div class="col-md-9">
                        <div class="checkbox-list">
                          <label>
                            <div class="checker"><span ng-class="{checked: form.doublePage}"><input ng-model="form.doublePage" type="checkbox" placeholder="{{ 'formats_given_in_spreads' | translate }}"></span></div>{{ 'formats_given_in_spreads' | translate }}</label>
                          </div>
                        </div>
                      </div>
                    </div>
                    <div class="form-actions">
                      <div class="row">
                        <div class="col-md-offset-3 col-md-9">
                          <button type="submit" class="btn btn-success"><i class="fa fa-plus"></i> {{ 'add' | translate }}</button>
                          <button ng-click="resetForm()" type="button" class="btn red-sunglo">{{ 'cancel' | translate }}</button>
                        </div>
                      </div>
                    </div>
                  </form>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

  <div class="col-lg-5 visible-lg">
    <div faq-accordion="printshop.pages"></div>
  </div>

  </div>
