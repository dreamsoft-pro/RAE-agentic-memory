<div class="portlet light">
  <div class="portlet-title">
    <div class="caption">
      <i class="fa fa-cog"></i> {{ "option" | translate }}: {{ currentOptionName }}
      <a ng-if="prevOption" ui-sref="printshop-configOptionSettings-realizationTimes({optID: prevOption})" class="prevNext"
         tooltip="{{ 'goto_previous_option' | translate }}"><i class="fa fa-arrow-circle-left"></i></a>
      <a ng-if="nextOption" ui-sref="printshop-configOptionSettings-realizationTimes({optID: nextOption})" class="prevNext"
         tooltip="{{ 'goto_next_option' | translate }}"><i class="fa fa-arrow-circle-right"></i></a>
    </div>
  </div>
</div>
<div ui-view="menu"></div>
<div class="row">
  <div class="col-md-12 col-lg-7">
    <div class="portlet light">
      <div class="portlet-body">

        <div class="overflowContainer" >
          <table class="table table-striped table-hover" ng-if="!!realizationTimes.length" >
            <thead>
              <tr role="row" class="heading">
                <th sort-trigger>{{ 'volume' | translate }}</th>
                <th>{{ 'additional_days_of_realization' | translate }}</th>
                <th>{{ 'actions' | translate }}</th>
              </tr>
            </thead>
            <tbody>
              <tr ng-repeat="realizationTime in realizationTimes | orderBy: 'volume'">
                <td>
                  {{ realizationTime.volume }}
                </td>
                <td>
                  {{ realizationTime.days }}
                </td>
                <td>
                  <button ng-confirm-click="remove(realizationTime)"
                    data-toggle="tooltip" data-container="body" tooltip="{{ 'delete' | translate }}"
                    class="btn red-sunglo btn-xs">
                      <span class="glyphicon glyphicon-remove"></span>
                  </button>
                </td>
              </tr>
            </tbody>
          </table>


        </div>

        <div class="row">
          <div class="col-md-12">
            
            <div class="portlet light">
              <div class="portlet-title">
                <div class="caption font-green-haze col-md-3 text-right">
                     {{ 'add_new' | translate }}
                </div>
              </div>
              <div class="portlet-body form">

                <form class="form-horizontal" role="form" ng-submit="add()">
                  <div class="form-body">
                    
                    <div class="form-group">
                      <label class="col-md-3 control-label">{{ 'volume' | translate }}</label>
                      <div class="col-md-9">
                        <input ng-model="form.volume" type="text" class="form-control" placeholder="{{ 'volume' | translate }}" required>
                      </div>
                    </div>

                    <div class="form-group">
                      <label class="col-md-3 control-label">{{ 'days_number' | translate }}</label>
                      <div class="col-md-9">
                        <input ng-model="form.days" type="text" class="form-control" placeholder="{{ 'days_number' | translate }}">
                      </div>
                    </div>

                  </div>

                  <div class="form-actions">
                    <div class="row">
                      <div class="col-md-offset-3 col-md-9">
                        <button type="submit" class="btn btn-success"><i class="fa fa-plus"></i> {{ 'add' | translate }}</button>
                        <button ng-click="resetForm()" type="button" class="btn red-sunglo">{{ 'cancel' | translate }}</button>
                      </div>
                    </div>
                  </div>

                </form>
              </div>
            </div>
          </div>
        </div>

      </div>
    </div>
  </div>

  <div class="col-lg-5 visible-lg">
    <div faq-accordion="printshop.configOptionsRealizationtimes" ></div>
  </div>

</div>
