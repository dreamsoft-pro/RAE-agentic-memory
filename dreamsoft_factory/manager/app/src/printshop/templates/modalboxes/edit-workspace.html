<div class="modal-header">
    <h3 class="modal-title">{{ 'edit' | translate }}: {{oryg.name}}</h3>
</div>

<form class="form-horizontal" role="form" ng-submit="save()">

  <div class="modal-body">
  
    <div class="form-body">
      
      <div class="form-group">
        <label class="col-md-3 control-label">{{ 'name' | translate }}</label>
        <div class="col-md-9">
          <input ng-model="form.name" type="text" class="form-control" placeholder="{{ 'name' | translate }}">
        </div>
      </div>

      <div class="form-group">
        <label class="col-md-3 control-label">{{ 'paper_width' | translate }}</label>
        <div class="col-md-9">
          <input ng-model="form.paperWidth" type="text" class="form-control" placeholder="{{ 'paper_width' | translate }}">
        </div>
      </div>

      <div class="form-group">
        <label class="col-md-3 control-label">{{ 'paper_height' | translate }}</label>
        <div class="col-md-9">
          <input ng-model="form.paperHeight" type="text" class="form-control" placeholder="{{ 'paper_height' | translate }}">
        </div>
      </div>

      <div class="form-group">
        <label class="col-md-3 control-label">{{ 'print_width' | translate }}</label>
        <div class="col-md-9">
          <input ng-model="form.width" type="text" class="form-control" placeholder="{{ 'print_width' | translate }}">
        </div>
      </div>

      <div class="form-group">
        <label class="col-md-3 control-label">{{ 'print_height' | translate }}</label>
        <div class="col-md-9">
          <input ng-model="form.height" type="text" class="form-control" placeholder="{{ 'print_height' | translate }}">
        </div>
      </div>

      <div class="form-group">
        <label class="col-md-3 control-label">{{ 'type' | translate }}</label>
        <div class="col-md-9">
          <select class="form-control"  ng-model="form.type" ng-options="each.ID as each.name for each in types"></select>
        </div>
      </div>


    </div>

    
  </div>
  <div class="modal-footer">
    <button class="btn red-sunglo" type="button" ng-click="cancel()">{{ 'cancel' | translate }}</button>
    <button class="btn btn-success"><i class="fa fa-check"></i> {{ 'save' | translate }}</button>
  </div>

</form>
