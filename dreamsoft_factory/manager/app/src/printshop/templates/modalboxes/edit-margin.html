<div class="modal-header">
    <h3 class="modal-title">{{ 'edit' | translate }}</h3>
</div>

<form class="form-horizontal" role="form" ng-submit="save()">
    <div class="form-body">

        <div class="form-group">
            <label class="col-md-4 control-label">{{ 'margin_pieces' | translate }}
            </label>
            <div class="col-md-4">
                <input ng-model="marginForm.piecesMin" type="number" min="0" class="form-control"
                       placeholder="{{ 'from' | translate }}">
            </div>
            <div class="col-md-4">
                <input ng-model="marginForm.piecesMax" type="number" min="0" class="form-control"
                       placeholder="{{ 'to' | translate }}">
            </div>
        </div>

        <div class="form-group">
            <label class="col-md-4 control-label">{{ 'margin_sheets' | translate }}</label>
            <div class="col-md-4">
                <input ng-model="marginForm.sheetsMin" type="number" min="0" class="form-control"
                       placeholder="{{ 'from' | translate }}">
            </div>
            <div class="col-md-4">
                <input ng-model="marginForm.sheetsMax" type="number" min="0" class="form-control"
                       placeholder="{{ 'to' | translate }}">
            </div>
        </div>

        <div class="form-group">
            <label class="col-md-4 control-label">{{ 'margin_square_meters' | translate }}</sup></label>
            <div class="col-md-4">
                <input ng-model="marginForm.sqmetersMin" type="number" min="0" class="form-control"
                       placeholder="{{ 'from' | translate }}">
            </div>
            <div class="col-md-4">
                <input ng-model="marginForm.sqmetersMax" type="number" min="0" class="form-control"
                       placeholder="{{ 'to' | translate }}">
            </div>
        </div>

        <div class="form-group">
            <label class="col-md-4 control-label">{{ 'margin_kilograms' | translate }}</sup></label>
            <div class="col-md-4">
                <input ng-model="marginForm.kilogramsMin" type="number" min="0" class="form-control"
                       placeholder="{{ 'from' | translate }}">
            </div>
            <div class="col-md-4">
                <input ng-model="marginForm.kilogramsMax" type="number" min="0" class="form-control"
                       placeholder="{{ 'to' | translate }}">
            </div>
        </div>

        <div class="form-group">
            <label class="col-md-4 control-label">{{ 'margin_meters' | translate }}</sup></label>
            <div class="col-md-4">
                <input ng-model="marginForm.metersMin" type="number" min="0" class="form-control"
                       placeholder="{{ 'from' | translate }}">
            </div>
            <div class="col-md-4">
                <input ng-model="marginForm.metersMax" type="number" min="0" class="form-control"
                       placeholder="{{ 'to' | translate }}">
            </div>
        </div>

        <div class="form-group">
            <label class="col-md-4 control-label">{{ 'margin_percentage' | translate }}</label>
            <div class="col-md-8">
                <input ng-model="marginForm.percentage" type="number" step="any"
                       class="form-control" placeholder="{{ 'margin_percentage' | translate }}">
            </div>
        </div>

    </div>

    <div class="modal-footer">
        <button class="btn red-sunglo" type="button" ng-click="cancel()">{{ 'cancel' | translate }}</button>
        <button class="btn btn-success"><i class="fa fa-check"></i> {{ 'save' | translate }}</button>
    </div>

</form>
