<div class="modal-header">
    <h3 class="modal-title">{{ 'edit' | translate }}: {{oryg.name}}</h3>
</div>

<form class="form-horizontal" role="form" ng-submit="save()">

    <div class="modal-body">

        <div class="form-body">

            <div class="form-group">
                <label class="col-md-3 control-label">{{ 'name' | translate }}</label>
                <div class="col-md-9">
                    <input ng-model="form.name" type="text" class="form-control" placeholder="{{ 'name' | translate }}">
                </div>
            </div>

            <div class="form-group">
                <label class="col-md-3 control-label">{{ 'workspace' | translate }} multi</label>
                <div class="col-md-9">
                    <select class="form-control" multiple ng-multiple="true" size="10" ng-model="form.workspaces"
                            ng-options="each.ID as each.name for each in workspaces"></select>
                </div>
            </div>

            <div class="form-group">
                <label class="col-md-3 control-label">{{ 'pricelist' | translate }}</label>
                <div class="col-md-9">
                    <select class="form-control" ng-model="form.pricelistID"
                            ng-options="each.ID as each.name for each in priceLists"></select>
                </div>
            </div>

        </div>

    </div>

    <div class="modal-footer">
        <button class="btn red-sunglo" type="button" ng-click="cancel()">{{ 'cancel' | translate }}</button>
        <button class="btn btn-success"><i class="fa fa-check"></i> {{ 'save' | translate }}</button>
    </div>

</form>
