<div class="modal-header">
    <h3 class="modal-title">{{ 'select_devices_or_work_stations' | translate }}</h3>
</div>

<div class="modal-body">

    <h3 class="modal-title alert alert-info">{{ 'operations' | translate }}: {{operation.name}}</h3>

    <div class="list-group clickable">
        <a class="list-group-item"
           data-ng-repeat="device in currentDevices"
           data-ng-click="device.selected = (device.selected != 1 ? 1 : 0)"
           data-ng-class="{active: device.selected}">
            <h3 class="list-group-item-heading">
                <small>{{device.ID}}</small>
                {{device.name}}
            </h3>
        </a>
    </div>
</div>

<div class="modal-footer">
    <button class="btn red-sunglo" type="button" ng-click="$dismiss()">{{ 'cancel' | translate }}</button>
    <button class="btn btn-success" ng-click="ok()"><i class="fa fa-check"></i> {{ 'save' | translate }}</button>
</div>
