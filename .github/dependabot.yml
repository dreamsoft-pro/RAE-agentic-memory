version: 2
updates:
  - package-ecosystem: "pip"
    directory: "/apps/memory_api"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    # Ignorujemy paczki ML, które wymagają ręcznej weryfikacji z CUDA na Node 1
    ignore:
      - dependency-name: "numpy"
      - dependency-name: "onnxruntime-gpu"
      - dependency-name: "scipy"
    groups:
      web-dependencies:
        patterns:
          - "fastapi"
          - "pydantic*"
          - "requests"
          - "aiohttp"
      security-critical:
        patterns:
          - "cryptography"
          - "pyjwt"
          - "authlib"

  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "weekly"
