services:
  rae-postgres:
    container_name: rae-postgres-lite-test
    ports: ["5441:5432"]
  rae-redis:
    container_name: rae-redis-lite-test
    ports: ["6380:6379"]
  rae-qdrant:
    container_name: rae-qdrant-lite-test
    ports: ["6335:6333"]
  rae-api-dev:
    container_name: rae-api-lite-test
    ports: ["8010:8000"]
    environment:
      - RAE_PROFILE=lite
      - RAE_DB_MODE=migrate
