# LLM Orchestrator Configuration - CLEAN & STABLE
default_strategy: single

models:
  - id: local_qwen
    provider: ollama
    model_name: qwen2.5:3b
    enabled: true
    roles: [general, low_cost, reflection]

  - id: local_llama
    provider: ollama
    model_name: llama3:8b
    enabled: true
    roles: [general, smart]

  - id: mistral
    provider: ollama
    model_name: mistral:latest
    enabled: true
    roles: [general]

  - id: phi3
    provider: ollama
    model_name: phi3:latest
    enabled: true
    roles: [general, math]

strategies:
  default:
    mode: single
    primary: local_qwen

  smart:
    mode: single
    primary: local_llama
