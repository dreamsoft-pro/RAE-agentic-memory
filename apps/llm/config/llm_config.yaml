# LLM Orchestrator Configuration - REPAIRED FOR CPU ONLY
default_strategy: single

models:
  - id: local_qwen
    provider: ollama
    model_name: qwen2.5:3b
    enabled: true
    roles: [general, reflection, coding, low_cost, offline]
    cost_weight: 0.0

  - id: local_llama
    provider: ollama
    model_name: llama3:8b
    enabled: true
    roles: [general, low_cost]
    cost_weight: 0.0

strategies:
  default:
    mode: single
    primary: local_qwen

  heavy:
    mode: single
    primary: local_llama

  low_cost:
    mode: single
    primary: local_qwen

  reflection:
    mode: single
    primary: local_qwen

  summaries:
    mode: fallback
    primary: local_qwen
    fallback: local_qwen
