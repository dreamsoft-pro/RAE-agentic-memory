# LLM Providers Configuration - REPAIRED
providers:
  ollama:
    endpoint: http://ollama-dev:11434
    api_key_env: null
    max_context: 8192
    supports_streaming: true
    supports_tools: false

  openai:
    endpoint: https://api.openai.com/v1
    api_key_env: OPENAI_API_KEY
    max_context: 128000
    enabled: false

  anthropic:
    endpoint: https://api.anthropic.com
    api_key_env: ANTHROPIC_API_KEY
    max_context: 200000
    enabled: false
