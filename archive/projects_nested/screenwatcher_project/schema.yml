components:
  schemas:
    Department:
      type: object
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        lines:
          type: array
          items:
            $ref: '#/components/schemas/Line'
          readOnly: true
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
        name:
          type: string
          maxLength: 100
        code:
          type: string
          description: Department code (e.g., 'DEPT-ASSEMBLY')
          maxLength: 50
          pattern: ^[-a-zA-Z0-9_]+$
        factory:
          type: string
          format: uuid
      required:
      - code
      - created_at
      - factory
      - id
      - lines
      - name
      - updated_at
    DowntimeEvent:
      type: object
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        machine:
          type: string
          format: uuid
          readOnly: true
        start_time:
          type: string
          format: date-time
          readOnly: true
        end_time:
          type: string
          format: date-time
          readOnly: true
          nullable: true
        duration_seconds:
          type: integer
          readOnly: true
        reason:
          type: integer
          nullable: true
        reason_code:
          type: string
          nullable: true
        reason_desc:
          type: string
          readOnly: true
        comment:
          type: string
      required:
      - duration_seconds
      - end_time
      - id
      - machine
      - reason_desc
      - start_time
    Factory:
      type: object
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        departments:
          type: array
          items:
            $ref: '#/components/schemas/Department'
          readOnly: true
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
        name:
          type: string
          maxLength: 100
        code:
          type: string
          description: Unique identifier for the factory (e.g., 'FACTORY-01')
          maxLength: 50
          pattern: ^[-a-zA-Z0-9_]+$
        address:
          type: string
          nullable: true
      required:
      - code
      - created_at
      - departments
      - id
      - name
      - updated_at
    Interface:
      type: object
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
        name:
