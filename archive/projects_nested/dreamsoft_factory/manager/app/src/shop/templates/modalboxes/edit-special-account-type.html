<div class="portlet light">
	<div class="portlet-title">
		<div class="caption">
			<i class="fa fa-male"></i> {{ 'edit_type' | translate }}
		</div>
	</div>
	<div class="portlet-body">
		<form class="form-horizontal" role="form" ng-submit="ok()">
			<div class="form-body">
				<div class="form-group">
					<label class="col-md-3 control-label">{{ 'type' | translate }}</label>
					<div class="col-md-9">
						<select ng-model="form.userTypeID" class="form-control" ng-options="userType.ID as userType.name for userType in userTypes" >
							<option value="">{{ 'none' | translate }}</option>
						</select>
					</div>
				</div>
				<div class="form-actions">
					<div class="row">
						<div class="col-md-offset-3 col-md-9">
							<button type="submit" class="btn btn-success"><i class="fa fa-check"></i> {{ 'save' | translate }}</button>
							<button ng-click="$dismiss()" type="button" class="btn red-sunglo">{{ 'cancel' | translate }}</button>
						</div>
					</div>
				</div>
			</div>
		</form>
	</div>
</div>
