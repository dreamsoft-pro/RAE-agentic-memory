<div class="row">
  <div class="col-lg-7 col-md-12">
    <div class="portlet light">
      <div class="portlet-title">
        <div class="caption">
          <i class="fa icon-settings"></i> {{ 'basic_configuration' | translate }}
        </div>
        
        <div class="tools hidden-lg">
          <button button-faq-accordion="shop.domainSettings"></button>
        </div>

      </div>
      <div class="portlet-body">

        <form class="form-horizontal" role="form" ng-submit="save()">
          <div class="form-body">
            
            <div class="form-group">
              <label class="col-md-3 control-label">{{ 'printing_house_name' | translate }}</label>
              <div class="col-md-9">
                <input ng-model="form.name" maxlength="255" type="text" class="form-control" placeholder="{{ 'printing_house_name' | translate }}">
              </div>
            </div>

            <div class="form-group">
              <label class="col-md-3 control-label">{{ 'description' | translate }}</label>
              <div class="col-md-9">
                <textarea ng-model="form.desc" type="text" class="form-control" placeholder="{{ 'description' | translate }}"></textarea>
              </div>
            </div>

            <div class="form-group">
              <label class="col-md-3 control-label">{{ 'url_address' | translate }}</label>
              <div class="col-md-9">
                <input ng-model="form.host" type="text" class="form-control" placeholder="{{ 'url_address' | translate }}">
              </div>
            </div>

            <div class="form-group">
              <label class="col-md-3 control-label"></label>
              <div class="col-md-9">
                <div class="checkbox-list">
                  <label>
                    <div class="checker"><span ng-class="{checked: form.ssl}"><input
                            ng-model="form.ssl" type="checkbox"></span></div>
                    SSL</label>
                </div>
              </div>
            </div>

          </div>

          <div class="form-actions">
            <div class="row">
              <div class="col-md-offset-3 col-md-9">
                <button type="submit" class="btn btn-success"><i class="fa fa-plus"></i> {{ 'add' | translate }}</button>
                <button ng-click="form = _.clone(currentDomain)" type="button" class="btn red-sunglo">{{ 'cancel' | translate }}</button>
              </div>
            </div>
          </div>

        </form>

      </div>
    </div>
  </div>
  <div class="col-lg-5 visible-lg">
    <div faq-accordion="shop.domainSettings" ></div>
  </div>
</div>
