<div class="row">
    <div class="col-lg-7 col-md-12">
        <div class="portlet light">
            <div class="portlet-title">
                <div class="caption">
                    <i class="fa icon-envelope-open"></i> {{ 'mail_settings' | translate }}
                </div>

                <div class="tools hidden-lg">
                    <button button-faq-accordion="shop.mailSettings"></button>
                </div>

            </div>
            <div class="portlet-body">

                <form class="form-horizontal" role="form" ng-submit="save()">
                    <div class="form-body">

                        <div class="form-group">
                            <label class="col-md-3 control-label">{{ 'titles' | translate }}</label>
                            <div class="col-md-9">
                                <input ng-repeat="lang in languages" ng-show="nameLang == lang.code"
                                       ng-model="form.fromName[lang.code]" type="text" class="form-control"
                                       placeholder="{{lang.code}}">
                                <select class="form-control" ng-model="nameLang"
                                        ng-options="each.code as each.name for (key, each) in languages"></select>
                            </div>
                        </div>

                        <div class="form-group">
                            <label class="col-md-3 control-label">{{ 'shipper_email' | translate }}</label>
                            <div class="col-md-9">
                                <input ng-model="form.from.value" type="text" class="form-control"
                                       placeholder="{{ 'shipper_email' | translate }}">
                            </div>
                        </div>

                        <div class="form-group">
                            <label class="col-md-3 control-label">{{ 'smtp_server_address' | translate }}</label>
                            <div class="col-md-9">
                                <textarea ng-model="form.host.value" type="text" class="form-control"
                                          placeholder="smtp_server_address"></textarea>
                            </div>
                        </div>

                        <div class="form-group">
                            <label class="col-md-3 control-label">{{ 'username' | translate }}</label>
                            <div class="col-md-9">
                                <input ng-model="form.username.value" type="text" class="form-control"
                                       placeholder="{{ 'username' | translate }}">
                            </div>
                        </div>

                        <div class="form-group">
                            <label class="col-md-3 control-label">{{ 'password' | translate }}</label>
                            <div class="col-md-9">
                                <input ng-model="form.passwd.value" type="password" class="form-control"
                                       placeholder="{{ 'password' | translate }}">
                            </div>
                        </div>

                        <div class="form-group">
                            <label class="col-md-3 control-label"></label>
                            <div class="col-md-9">
                                <div class="checkbox-list">
                                    <label>
                                        <div class="checker"><span ng-class="{checked: form.ssl.value}"><input
                                                ng-model="form.ssl.value" type="checkbox"></span></div>
                                        SSL</label>
                                </div>
                            </div>
                        </div>

                        <div class="form-group">
                            <label class="col-md-3 control-label">{{ 'port' | translate }}</label>
                            <div class="col-md-9">
                                <input ng-model="form.port.value" type="text" class="form-control"
                                       placeholder="{{ 'port' | translate }}">
                            </div>
                        </div>

                    </div>

                    <div class="form-actions">
                        <div class="row">
                            <div class="col-md-offset-3 col-md-9">
                                <button type="submit" class="btn btn-success"><i class="fa fa-plus"></i> {{ 'save' |
                                    translate }}
                                </button>
                                <button ng-click="reset()" type="button" class="btn red-sunglo">{{ 'cancel' | translate
                                    }}
                                </button>
                            </div>
                        </div>
                    </div>

                </form>

            </div>
        </div>
    </div>
    <div class="col-lg-5 visible-lg">
        <div faq-accordion="shop.mailSettings"></div>
    </div>
</div>
