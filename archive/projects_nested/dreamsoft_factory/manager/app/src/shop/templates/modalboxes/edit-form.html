<div class="modal-header">
    <h3 class="modal-title">{{ form.key }}</h3>
</div>

<form class="form-horizontal" role="form" ng-submit="save()">

    <div class="modal-body">

        <div class="form-body">

            <div class="form-group">
                <label class="col-md-3 control-label">{{ 'key' | translate }}</label>
                <div class="col-md-9">
                    <input disabled="disabled" ng-model="form.key" type="text" class="form-control" placeholder="{{ 'key' | translate }}">
                </div>
            </div>

            <div class="form-group">
                <label class="col-md-3 control-label">
                    {{ 'recipients' | translate }}
                    <i class="fa fa-info-circle" tooltip="{{ 'separate_email_addresses_with_comma' | translate }}" aria-hidden="true"></i>
                </label>
                <div class="col-md-9">
                    <input class="form-control" ng-model="form.value" placeholder="{{ 'recipients' | translate }}">
                </div>
            </div>

        </div>

    </div>
    <div class="modal-footer">
        <button class="btn red-sunglo" type="button" ng-click="$dismiss()">{{ 'cancel' | translate }}</button>
        <button class="btn btn-success"><i class="fa fa-check"></i> {{ 'save' | translate }}</button>
    </div>

</form>
