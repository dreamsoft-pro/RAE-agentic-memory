<div class="modal-header">
  <h3 class="modal-title">{{ lang.value }}</h3>
</div>
<div class="modal-body" >
  <div class="row">
    <div class="col-md-12">

      <form class="form-horizontal" role="form">
        <div class="form-group">
          <label class="col-md-3 control-label">{{ 'key' | translate }}</label>
          <div class="col-md-9">
            <input disabled="disabled" ng-model="form.key" type="text" class="form-control" placeholder="{{ 'key' | translate }}">
          </div>
        </div>
        <div class="form-group">
          <label class="col-md-3 control-label">{{ 'value' | translate }}</label>
          <div class="col-md-9">
            <input ng-model="form.value" type="text" class="form-control"placeholder="{{ 'value' | translate }}">
          </div>
        </div>
        <div class="form-group">
          <label class="col-md-3 control-label">{{ 'language' | translate }}</label>
          <div class="col-md-9">
            <input disabled="disabled" ng-model="form.lang" type="text" class="form-control" placeholder="{{ 'language' | translate }}">
          </div>
        </div>
      </form>

    </div>
  </div>
</div>
<div class="modal-footer">
  <button class="btn red-sunglo" ng-click="$dismiss()">{{ 'cancel' | translate }}</button>
  <button class="btn btn-success" ng-click="ok()">{{ 'submit' | translate }}</button>
</div>
