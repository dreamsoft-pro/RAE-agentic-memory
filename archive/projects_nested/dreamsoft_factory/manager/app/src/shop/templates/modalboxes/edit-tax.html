<div class="modal-header">
  <h3 class="modal-title">{{ tax.name }}</h3>
</div>
<div class="modal-body" >
  <div class="row">
    <div class="col-md-12">

      <form class="form-horizontal" role="form">
        <div class="form-group">
          <label class="col-md-3 control-label">{{ 'percentage' | translate }}</label>
          <div class="col-md-9">
            <input ng-model="form.value" type="text" class="form-control" placeholder="{{ 'percentage' | translate }}">
          </div>
        </div>
        <div class="form-group">
          <label class="col-md-3 control-label"></label>
          <div class="col-md-9">
            <div class="checkbox-list">
              <label>
              <div class="checker"><span ng-class="{checked: !!parseInt(form.active)}"><input ng-model="form.active" ng-true-value="1" ng-false-value="0" type="checkbox"></span></div>{{ 'active' | translate }}</label>
            </div>
          </div>
        </div>
        <div class="form-group">
          <label class="col-md-3 control-label"></label>
          <div class="col-md-9">
            <div class="checkbox-list">
              <label>
                <div class="checker">
                  <span ng-class="{ checked: !!form.default }">
                    <input ng-model="form.default" ng-true-value="1" ng-false-value="0" type="checkbox">
                  </span>
                </div>
                {{ 'default' | translate }}
              </label>
            </div>
          </div>
        </div>
      </form>

    </div>
  </div>
</div>
<div class="modal-footer">
  <button class="btn red-sunglo" ng-click="$dismiss()">{{ 'cancel' | translate }}</button>
  <button class="btn btn-success" ng-click="ok()">{{ 'submit' | translate }}</button>
</div>
