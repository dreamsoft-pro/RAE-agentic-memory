<div class="modal-header">
    <h3 class="modal-title">{{ payment.name }}</h3>
</div>

<form class="form-horizontal" role="form" ng-submit="save()">

    <div class="modal-body">

        <div class="form-body">
            <div class="form-group">
                <label class="col-md-3 control-label">{{ 'lang_name' | translate }}</label>
                <div class="col-md-9">
                    <input ng-repeat="lang in languages" ng-show="nameLang == lang.code"
                           ng-model="form.names[lang.code]"
                           type="text" class="form-control" placeholder="{{lang.code}}"/>
                    <select class="form-control" ng-init="nameLang = currentLang.code" ng-model="nameLang"
                            ng-options="each.code as each.name for (key, each) in languages"></select>
                </div>
            </div>

            <div class="form-group">
                <label class="col-md-3 control-label">{{ 'text' | translate }}</label>
                <div class="col-md-9">
                <textarea ng-repeat="lang in languages" ng-show="nameLang == lang.code"
                          ng-model="form.contents[lang.code]" type="text" class="form-control"
                          placeholder="{{lang.code}}"></textarea>
                    <select class="form-control" ng-init="nameLang = currentLang.code"
                            ng-model="nameLang"
                            ng-options="each.code as each.name for (key, each) in languages"></select>
                </div>
            </div>

            <div class="form-group">
                <label class="col-md-3 control-label">{{ 'payment_method' | translate }}</label>
                <div class="col-md-9">
                    <select class="form-control" ng-model="form.mainComponentID"
                            ng-change="selectPayment(form.mainComponentID, form) "
                            ng-options="each.ID as each.name for (key, each) in paymentSettings"></select>
                </div>
            </div>


            <div class="form-group" ng-repeat="key in _.findWhere(paymentSettings, {ID: form.mainComponentID}).keys"
                 ng-if="form.mainComponentID">
                <label class="col-md-3 control-label">{{ key.langs[currentLang.code].name }}</label>
                <div class="col-md-9">
                    <input ng-if="key.type != 'select'" ng-model="form.paymentKeys[key.ID]" type="{{key.type}}"
                           class="form-control" placeholder="{{ key.langs[currentLang.code].name }}">
                    <select class="form-control" ng-if="key.type == 'select'"
                            ng-model="form.paymentKeys[key.ID]"
                            ng-options="option.value as option.langs[currentLang.code].name for option in key.options">
                        ></select>
                </div>
            </div>

            <div ng-if="sellers.length > 0" class="form-group">
                <label class="col-md-3 control-label">{{ 'select_seller' | translate }}</label>
                <div class="col-md-9">
                    <select class="form-control"
                            ng-model="form.sellerID"
                            ng-options="seller.ID as seller.user for seller in sellers">

                        <option value="">{{ 'select' | translate }}</option>
                    </select>
                </div>
            </div>

        </div>

    </div>
    <div class="modal-footer">
        <button class="btn red-sunglo" type="button" ng-click="$dismiss()">{{ 'cancel' | translate }}</button>
        <button class="btn btn-success"><i class="fa fa-check"></i> {{ 'save' | translate }}</button>
    </div>

</form>
