<div class="row">
  <div class="col-lg-7 col-md-12">
    <div class="portlet light">
      <div class="portlet-title">
        <div class="caption">
          <i class="fa icon-envelope-open"></i> {{ 'payment_settings' | translate }}
        </div>
        
        <div class="tools hidden-lg">
          <button button-faq-accordion="shop.paymentSettings"></button>
        </div>

      </div>
      <div class="portlet-body">
        
        <div class="overflowContainer">
          <table class="table table-striped table-hover">
            <thead>
              <tr role="row" class="heading">
              	<th>#</th>
              	<th>
                  {{ 'name' | translate }}
                  <select ng-model="showLang" ng-options="lang.code as lang.name for (key, lang) in languages" ng-init="showLang = currentLang.code"></select>
                </th>
                <th>{{ 'active' | translate }}</th>
                <th>{{ 'actions' | translate }}</th>
              </tr>
            </thead>
            <tbody>
              <tr ng-repeat="payment in payments">
              	<td>{{ payment.ID }}</td>
              	<td>
                  {{ payment.names[showLang] }}
                </td>
                <td>
                  <span class="btn blue-stripe btn-xs"
                    ng-class="{'red-sunglo-stripe': !payment.active}">
                    {{ !!payment.active ? 'yes' : 'no' | translate }}
                  </span>
                </td>
                <td class="text-left">
                  <button ng-click="edit(payment)"
                    data-toggle="tooltip" data-container="body" tooltip="{{ 'edit' | translate }}"
                    class="btn blue-hoki btn-xs">
                    <span class="glyphicon glyphicon-edit"></span>
                  </button>
                  <button ng-confirm-click="remove(payment.ID)"
                    data-toggle="tooltip" data-container="body" tooltip="{{ 'delete' | translate }}"
                    class="btn red-sunglo btn-xs">
                      <span class="glyphicon glyphicon-remove"></span>
                  </button>
                </td>
              </tr>
            </tbody>
          </table>
        </div>

        <form class="form-horizontal" role="form" ng-submit="add()">
          <div class="form-body">
            <div class="form-group">
              <label class="col-md-3 control-label">{{ 'lang_name' | translate }}</label>
              <div class="col-md-9">
                <input ng-repeat="lang in languages" ng-show="nameLang == lang.code" ng-model="form.names[lang.code]"
                       type="text" class="form-control" placeholder="{{lang.code}}"/>
                <select class="form-control" ng-init="nameLang = currentLang.code" ng-model="nameLang"
                        ng-options="each.code as each.name for (key, each) in languages"></select>
              </div>
            </div>

            <div class="form-group">
              <label class="col-md-3 control-label">{{ 'text' | translate }}</label>
              <div class="col-md-9">
                <textarea ng-repeat="lang in languages" ng-show="nameLang == lang.code" ng-model="form.contents[lang.code]"
                          type="text" class="form-control" placeholder="{{lang.code}}"></textarea>
                <select class="form-control" ng-init="nameLang = currentLang.code" ng-model="nameLang"
                        ng-options="each.code as each.name for (key, each) in languages"></select>
              </div>
            </div>

            <div class="form-group">
              <label class="col-md-3 control-label">{{ 'payment_method' | translate }}</label>
              <div class="col-md-9">
                <select class="form-control" ng-model="form.mainComponentID" ng-change="selectPayment(form.mainComponentID, form) "
                        ng-options="each.ID as each.name for (key, each) in paymentSettings"></select>
              </div>
            </div>


            <div class="form-group" ng-repeat="key in _.findWhere(paymentSettings, {ID: form.mainComponentID}).keys" ng-if="form.mainComponentID">
              <label class="col-md-3 control-label">{{ key.langs[currentLang.code].name }}</label>
              <div class="col-md-9">
                <input  ng-if="key.type != 'select'" ng-model="form.paymentKeys[key.ID]" type="{{key.type}}" class="form-control" placeholder="{{ key.langs[currentLang.code].name }}">
                <select class="form-control" ng-if="key.type == 'select'"
                        ng-model="form.paymentKeys[key.ID]"
                        ng-options="option.value as option.langs[currentLang.code].name for option in key.options">
                  ></select>
              </div>
            </div>

            <div ng-if="sellers.length > 0" class="form-group">
              <label class="col-md-3 control-label">{{ 'select_seller' | translate }}</label>
              <div class="col-md-9">
                <select class="form-control"
                        ng-model="form.sellerID"
                        ng-options="seller.ID as seller.user for seller in sellers">

                  <option value="">{{ 'select' | translate }}</option>
                </select>
              </div>
            </div>

          </div>
          <div class="form-actions">
            <div class="row">
              <div class="col-md-offset-3 col-md-9">
                <button  class="btn btn-success"><i class="fa fa-plus"></i> {{ 'add' | translate }}</button>
                <button ng-click="reset()" type="button" class="btn red-sunglo">{{ 'cancel' | translate }}</button>
              </div>
            </div>
          </div>
        </form>

      </div>
    </div>
  </div>
  <div class="col-lg-5 visible-lg">
    <div faq-accordion="shop.paymentSettings" ></div>
  </div>
</div>
