<div class="modal-header">
  <h3 class="modal-title">Key options</h3>
</div>
<div class="modal-body" >
  <div class="row">
    <div class="col-md-12">
  
      <div class="overflowContainer">
        <table class="table table-striped table-hover">
          <thead>
            <tr role="row" class="heading">
              <th>#</th>
              <th>Value</th>
              <th>
                Name
                <select ng-model="showLang" ng-options="lang.code as lang.name for (key, lang) in languages" ng-init="showLang = currentLang.code"></select>
              </th>
              <th class="text-right">Actions</th>
            </tr>
          </thead>
          <tbody>
            <tr ng-repeat="option in options">
              <td>{{ option.ID }}</td>
              <td>{{ option.value }}</td>
              <td>{{ option.names[showLang] }}</td>
              <td class="text-right">
                <a class="edit" href="javascript:;" ng-click="edit(option)">Edit</a>
                <a class="edit" href="javascript:;" ng-confirm-click="remove(option.ID)">Delete</a>
              </td>
            </tr>
          </tbody>
        </table>
      </div>

      <form class="form-horizontal" role="form" ng-submit="add()">
        
        <div class="form-group">
          <label class="col-md-3 control-label">Value</label>
          <div class="col-md-9">
            <input ng-model="form.value" type="text" class="form-control" placeholder="{{ 'value' | translate }}">
          </div>
        </div>
        <div class="form-group">
          <label class="col-md-3 control-label">Names</label>
          <div class="col-md-9">
            <input ng-repeat="lang in languages" ng-show="nameLang == lang.code" ng-model="form.names[lang.code]" type="text" class="form-control" placeholder="{{lang.code}}" >
            <select class="form-control" ng-init="nameLang = currentLang.code" ng-model="nameLang" ng-options="each.code as each.name for (key, each) in languages"></select>
          </div>
        </div>
        <div class="form-actions">
          <div class="row">
            <div class="col-md-offset-3 col-md-9">
              <button type="submit" class="btn btn-success"><i class="fa fa-plus"></i> {{ 'add' | translate }}</button>
              <button ng-click="form = {}" type="button" class="btn btn-success">{{ 'cancel' | translate }}</button>
            </div>
          </div>
        </div>
      </form>
    </div>
  </div>
</div>
<div class="modal-footer">
  <button class="btn btn-warning" ng-click="$dismiss()">Close</button>
</div>
