<div class="row">
  <div class="col-md-12">
    <div class="portlet light">
      <div class="portlet-title">
        <div class="caption">
          <i class="fa fa-edit"></i>Lang Settings
        </div>
        <div class="tools">
          <!-- <a href="javascript:;" class="collapse">
          </a>
          <a href="#portlet-config" data-toggle="modal" class="config">
          </a> -->
          <a href="javascript:;" ng-click="refresh()" class="reload">
          </a>
        </div>
      </div>
      <div class="portlet-body">
        <div class="overflowContainer">
          <table class="table table-striped table-hover">
            <thead>
              <tr role="row" class="heading">
                <th>#</th>
                <th>Code</th>
                <th>Name</th>
                <th>{{ 'active' | translate }}</th>
                <th  class="text-right">Actions</th>
              </tr>
            </thead>
            <tbody>
              <tr ng-repeat="lang in langlist">
                <td>{{ lang.ID }}</td>
                <td>{{ lang.code }}</td>
                <td>{{ lang.name }}</td>
                <td>
                  <span class="btn blue-stripe btn-xs"
                    ng-class="{'red-sunglo-stripe': !lang.active}">
                    {{ !!lang.active ? 'yes' : 'no' | translate }}
                  </span>
                </td>
                <td class="text-right">
                  <a class="edit" href="javascript:;" ng-click="edit(lang)">Edit</a>
                  <a class="edit" href="javascript:;" ng-confirm-click="remove(lang.ID)">Delete</a>
                </td>
              </tr>
            </tbody>
          </table>
        </div>
        
        <div class="row">
          <div class="col-md-12">
            
            <div class="portlet light">
              <div class="portlet-title">
                <div class="caption">
                  <i class="fa fa-gift"></i> Add lang
                </div>
              </div>
              <div class="portlet-body form">
                <form class="form-horizontal" role="form" ng-submit="add()">
                  <div class="form-body">
                    
                    <div class="form-group">
                      <label class="col-md-3 control-label">{{ 'code' | translate }}</label>
                      <div class="col-md-9">
                        <input ng-model="form.code" type="text" class="form-control" placeholder="{{ 'code' | translate }}">
                      </div>
                    </div>
                    <div class="form-group">
                      <label class="col-md-3 control-label">{{ 'name' | translate }}</label>
                      <div class="col-md-9">
                        <input ng-model="form.name" type="text" class="form-control" placeholder="{{ 'name' | translate }}">
                      </div>
                    </div>
                  </div>
                  <div class="form-actions">
                    <div class="row">
                      <div class="col-md-offset-3 col-md-9">
                        <button type="submit" class="btn btn-success"><i class="fa fa-plus"></i> {{ 'add' | translate }}</button>
                        <button ng-click="form = {}" type="button" class="btn red-sunglo">{{ 'cancel' | translate }}</button>
                      </div>
                    </div>
                  </div>
                </form>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
