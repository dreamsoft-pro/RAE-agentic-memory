<div class="row">
    <div class="col-md-12">

        <div class="portlet light">
            <div class="portlet-title">
                <div class="caption">
                    <i class="fa fa-gift"></i> Request Tester
                </div>
            </div>
            <div class="portlet-body form">
                <form class="form-horizontal" role="form" ng-submit="doRequest()">
                    <div class="form-body">

                        <div class="form-group">
                            <label class="col-md-3 control-label">{{ 'shortcuts' | translate }}</label>
                            <div class="col-md-9">
                                <span ng-repeat="shortcut in shortcuts">
                                    <button type="button" class="btn btn-default"
                                            ng-click="getShortcut(1)">{{ shortcut.value }}</button>
                                </span>
                            </div>
                        </div>

                        <div class="form-group">
                            <label class="col-md-3 control-label">Resource</label>
                            <div class="col-md-9">
                                <div class="input-group">
                                    <span class="input-group-addon">/</span>
                                    <input ng-model="form.request" type="text" required class="form-control">
                                </div>
                            </div>
                        </div>

                        <button ng-click="addFileParam()" type="button" class="btn">Uploader form</button>


                        <div ng-repeat="param in form.fileParams">
                            <div class="form-group">
                                <label class="col-md-3 control-label">File Key {{ $index + 1 }}</label>
                                <div class="col-md-9">
                                    <input type="text" class="form-control" placeholder="Key"
                                           ng-model="form.fileParams[$index].key">
                                </div>
                            </div>
                            <div class="form-group">
                                <label class="col-md-3 control-label">File {{ $index + 1 }}</label>
                                <div class="col-md-9">
                                    <!---->
                                    <input type="file" ngf-select ng-model="form.fileParams[$index].uploader"
                                           ngf-multiple="true">
                                    <!-- <input  nv-file-select uploader="form.fileParams[$index].uploader"  type="file"  class="form-control" placeholder="">   -->
                                </div>
                            </div>
                            <hr/>
                        </div>

                        <div ng-if="!form.fileParams.length" class="form-group">
                            <label class="col-md-3 control-label">Dropdown</label>
                            <div class="col-md-9">
                                <select required class="form-control" ng-model="form.requestMethod"
                                        ng-options="method.method as method.method for method in requestMethods"></select>
                            </div>
                        </div>

                        <hr ng-show="form.parameters.length"/>
                        <div ng-repeat="param in form.parameters">
                            <div class="form-group">
                                <label class="col-md-3 control-label">Key {{ $index + 1 }}</label>
                                <div class="col-md-9">
                                    <input type="text" class="form-control" placeholder="Key"
                                           ng-model="form.parameters[$index].key">
                                </div>
                            </div>
                            <div class="form-group">
                                <label class="col-md-3 control-label">Value {{ $index + 1 }}</label>
                                <div class="col-md-9">
                                    <input type="text" class="form-control" placeholder="Value"
                                           ng-model="form.parameters[$index].value">
                                </div>
                            </div>
                            <hr/>
                        </div>

                        <div class="form-actions">
                            <div class="row">
                                <div class="col-md-offset-3 col-md-9">
                                    <button ng-click="addParameter()" type="button" class="btn">Add parameter</button>
                                    <button class="btn btn-success">Submit</button>
                                </div>
                            </div>
                        </div>
                        <div class="form-actions">
                            <div class="row">
                                <div class="col-md-6">
                                    <label class="col-md-3 control-label">Kopiowanie szablonu:</label>
                                    <input ng-model="form.templateID" placeholder="ID szablonu" type="number">
                                    <button class="btn btn-danger" type="button" ng-confirm-click="copyTemplate()"
                                            confirm-text="Szablony zostaną nadpisane, czy napewno wykonać?">Kopiuj
                                    </button>
                                </div>
                                <div class="col-md-6 text-right">
                                    <button class="btn btn-primary " type="button" ng-confirm-click="initPerms()">
                                        Update Permissions
                                    </button>
                                </div>
                            </div>
                        </div>

                        <div ng-bind="updateInfo"></div>

                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<div ui-view="add-domain"></div>

<div ui-view="create-company"></div>

<div ui-view="socket-tester"></div>

<div ui-view="import-users"></div>
