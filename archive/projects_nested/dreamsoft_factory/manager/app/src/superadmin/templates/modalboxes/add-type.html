<div class="modal-header">
  <h3 class="modal-title">{{ editMode ? 'Edit type' : 'Add type'}}</h3>
</div>
<div class="modal-body" >
  <div class="row">
    <div class="col-md-12">

      <form class="form-horizontal" role="form">
        <div class="form-group">
          <label for="form_name" class="col-sm-2 control-label">{{ 'name' | translate }}</label>
          <div class="col-sm-10">
            <input type="text" class="form-control" id="form_name" placeholder="Name" ng-model="form.name">
          </div>
        </div>
        <div class="form-group">
          <label for="form_controller" class="col-sm-2 control-label">{{ 'description' | translate }}</label>
          <div class="col-sm-10">
            <input type="text" class="form-control" id="form_controller" placeholder="Description" ng-model="form.description">
          </div>
        </div>
        <div class="form-group" ng-if="editMode">
          <label for="form_controller" class="col-sm-2 control-label"></label>
          <div class="col-sm-10">
            <div class="checkbox-list">
            <label>
              <div class="checker"><span ng-class="{ checked: form.default == 1 }"><input ng-model="form.default" ng-true-value="1" type="checkbox"></span></div>{{ 'default' | translate }}
              </label>
            </div>
          </div>
        </div>
      </form>

    </div>
  </div>
</div>
<div class="modal-footer">
  <button class="btn red-sunglo" ng-click="$dismiss()">Cancel</button>
  <button class="btn btn-primary" ng-click="ok()">{{ 'save' | translate }}</button>
</div>
