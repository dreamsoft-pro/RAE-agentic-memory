<div class="modal-header">
  <h3 class="modal-title">Edit module</h3>
</div>
<div class="modal-body" >
  <div class="row">
    <div class="col-md-12">
      <form class="form-horizontal" role="form">
        
        <div class="form-group">
          <label class="col-md-3 control-label">{{ 'name' | translate }}</label>
          <div class="col-md-9">
            <input ng-model="form.name" type="text" class="form-control" placeholder="{{ 'name' | translate }}">
          </div>
        </div>
        <div class="form-group">
          <label class="col-md-3 control-label">{{ 'key' | translate }}</label>
          <div class="col-md-9">
            <input ng-model="form.key" type="text" class="form-control" placeholder="{{ 'key' | translate }}">
          </div>
        </div>
        <div class="form-group">
          <label class="col-md-3 control-label">{{ 'type' | translate }}</label>
          <div class="col-md-9">
            <select class="form-control"  ng-model="form.typeID" ng-options="each.ID as each.name for each in moduleTypes">
            </select>
          </div>
        </div>
      </form>
    </div>
  </div>
</div>
<div class="modal-footer">
  <button class="btn btn-warning" ng-click="$dismiss()">Cancel</button>
  <button class="btn btn-primary" ng-click="ok()">OK</button>
</div>
