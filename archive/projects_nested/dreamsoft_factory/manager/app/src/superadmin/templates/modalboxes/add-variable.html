<div class="modal-header">
    <h3 class="modal-title">{{ 'template' | translate }} <!-- {{template.name}} {{user.user}} --></h3>
</div>

<form class="form-horizontal" role="form" ng-submit="save()">

  <div class="modal-body">
   
    <h3 class="alert alert-info ng-binding">{{ 'variables' | translate }} <small>select variables for template</small></h3>
    <div class="list-group clickable">
      <a class="list-group-item" style="cursor: pointer;"
       data-ng-repeat="variable in variables"
       data-ng-click="variable.selected = (variable.selected != 1 ? 1 : 0)"
       data-ng-class="{active: variable.selected}">
        <h3 class="list-group-item-heading">
          {{variable.name}}
        </h3>
      </a>
    </div>

    
  </div>
  <div class="modal-footer">
    <button class="btn btn-default" type="button" ng-click="$dismiss()">Cancel</button>
    <button class="btn btn-primary">Save</button>
  </div>

</form>
