<div class="row">
  <div class="col-md-12">
    <div class="portlet light">
      <div class="portlet-title">
        <div class="caption">
          <i class="fa fa-info"></i> {{ 'helps' | translate }}
        </div>
        <div class="tools">
          <!-- <a href="javascript:;" class="collapse">
          </a>
          <a href="#portlet-config" data-toggle="modal" class="config">
          </a> -->
          <a href="javascript:;" ng-click="refresh()" class="reload">
          </a>
        </div>
      </div>
      <div class="portlet-body">
        <div class="overflowContainer">
          <table class="table table-striped table-hover">
            <thead>
              <tr role="row" class="heading">
                <th>#</th>
                <th>{{ 'module' | translate }}</th>
                <th>{{ 'active' | translate }}</th>
                <th  class="text-right">{{ 'actions' | translate }}</th>
              </tr>
            </thead>
            <tbody>
              <tr ng-repeat="module in modules">
                <td>{{ module.ID }}</td>
                <td>{{ module.module }}</td>
                <td>
                  <span class="btn blue-stripe btn-xs"
                    ng-class="{'red-sunglo-stripe': !module.active}">
                    {{ !!module.active ? 'yes' : 'no' | translate }}
                  </span>
                </td>
                <td class="text-right">
                  <a class="edit" href="javascript:;" ng-click="edit(module)" tooltip="{{ 'edit' | translate }}">{{ 'edit' | translate }}</a>
                  <a class="edit" href="javascript:;" ng-click="keys(module)" tooltip="{{ 'keys' | translate }}">{{ 'keys' | translate }}</a>
                  <a class="edit" href="javascript:;" ng-confirm-click="remove(module)" tooltip="{{ 'delete' | translate }}">{{ 'delete' | translate }}</a>
                </td>
              </tr>
            </tbody>
          </table>
        </div>
        
        <div class="row">
          <div class="col-md-12">
            
            <div class="portlet light">
              <div class="portlet-title">
                <div class="caption font-green-haze col-md-3 text-right">
                  <i class="fa fa-gift font-green-haze"></i> {{ 'add' | translate }}
                </div>
              </div>
              <div class="portlet-body form">
                <form class="form-horizontal" role="form" ng-submit="add()">
                  <div class="form-body">
                    
                    <div class="form-group">
                      <label class="col-md-3 control-label">{{ 'module' | translate }}</label>
                      <div class="col-md-9">
                        <input ng-model="form.module" type="text" class="form-control" placeholder="{{ 'module' | translate }}">
                      </div>
                    </div>

                  </div>
                  <div class="form-actions">
                    <div class="row">
                      <div class="col-md-offset-3 col-md-9">
                        <button type="submit" class="btn btn-success"><i class="fa fa-plus"></i> {{ 'add' | translate }}</button>
                        <button ng-click="form = {}" type="button" class="btn red-sunglo">{{ 'cancel' | translate }}</button>
                      </div>
                    </div>
                  </div>
                </form>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
