<div class="modal-header">
    <h3 class="modal-title">User {{user.name}} {{user.user}}</h3>
</div>

<form class="form-horizontal" role="form" ng-submit="save()">

  <div class="modal-body">
   
    <h3 class="alert alert-info ng-binding">Groups <small>select groups for type</small></h3>
    <div class="list-group clickable">
      <a class="list-group-item" style="cursor: pointer;"
       data-ng-repeat="group in currentGroups"
       data-ng-click="group.selected = (group.selected != 1 ? 1 : 0)"
       data-ng-class="{active: group.selected}">
        <h3 class="list-group-item-heading">
          {{group.name}}
        </h3>
      </a>
    </div>

    
  </div>
  <div class="modal-footer">
    <button class="btn btn-default" type="button" ng-click="$dismiss()">Cancel</button>
    <button class="btn btn-primary">Save</button>
  </div>

</form>
