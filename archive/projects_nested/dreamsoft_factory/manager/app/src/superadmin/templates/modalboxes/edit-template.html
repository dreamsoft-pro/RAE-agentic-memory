<div class="modal-header">
    <h3 class="modal-title">{{ 'edit' | translate }} {{template.name}}</h3>
</div>

<form class="form-horizontal" role="form" ng-submit="ok()">

    <div class="modal-body">
        <div class="form-body">
            <div class="form-group">
                <label class="col-md-3 control-label">{{ 'name' | translate }}</label>
                <div class="col-md-9">
                    <input ng-model="form.name" type="text" class="form-control" placeholder="">
                </div>
            </div>
            <div class="form-group">
                <div class="col-md-9">
                        <label class="col-md-3 control-label">
                            {{ 'use_variables' | translate }}
                        </label>
                    <input ng-model="form.useVariables" type="checkbox" ng-true-value="1" ng-false-value="0" class="form-control" placeholder="">
                    </div>

                </div>
            </div>
        </div>

    </div>
    <div class="modal-footer">
        <button class="btn red-sunglo" type="button" ng-click="$dismiss()">{{ 'cancel' | translate }}</button>
        <button class="btn btn-success"><i class="fa fa-check"></i> {{ 'save' | translate }}</button>
    </div>

</form>
