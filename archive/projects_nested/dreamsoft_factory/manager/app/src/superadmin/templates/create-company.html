<div class="row">
    <div class="col-lg-7 col-md-12">
        <div class="portlet light">
            <div class="portlet-title">
                <div class="caption">
                    <i class="fa icon-settings"></i> {{ 'new_company' | translate }}
                </div>

            </div>
            <div class="portlet-body">

                <form class="form-horizontal" role="form" ng-submit="saveCompany()">
                    <div class="form-body">

                        <div class="form-group">
                            <label class="col-md-3 control-label">{{ 'name' | translate }}</label>
                            <div class="col-md-9">
                                <input ng-model="form.settings.user" maxlength="255" type="text" class="form-control" placeholder="{{ 'name' | translate }}...">
                            </div>
                        </div>

                        <div class="form-group">
                            <label class="col-md-3 control-label">{{ 'password' | translate }}</label>
                            <div class="col-md-9">
                                <input ng-model="form.settings.dbpass" type="password" class="form-control" placeholder="{{ 'password' | translate }}...">
                            </div>
                        </div>

                    </div>

                    <div class="form-actions">
                        <div class="row">
                            <div class="col-md-offset-3 col-md-9">
                                <button type="submit" class="btn btn-success"><i class="fa fa-plus"></i> {{ 'add' | translate }}</button>
                                <button ng-click="form = {}" type="button" class="btn red-sunglo">{{ 'cancel' | translate }}</button>
                            </div>
                        </div>
                    </div>

                </form>

            </div>
        </div>
    </div>
    <div class="col-lg-5 visible-lg">
        <div faq-accordion="superadmin.createCompany" ></div>
    </div>
</div>
