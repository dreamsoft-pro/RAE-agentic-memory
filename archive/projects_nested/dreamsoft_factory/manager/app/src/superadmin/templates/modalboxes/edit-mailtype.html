<div class="modal-header">
  <h3 class="modal-title">Edit mail type</h3>
</div>
<form class="form-horizontal" role="form" ng-submit="save()">
  <div class="modal-body" >
    <div class="row">
      <div class="col-md-12">
        <div class="form-body">
          <div class="form-group">
            <label class="col-md-3 control-label">Names</label>
            <div class="col-md-9">
              <input ng-repeat="lang in languages" ng-show="nameLang == lang.code" ng-model="form.names[lang.code]" type="text" class="form-control" placeholder="{{lang.code}}" >
            <select class="form-control" ng-init="nameLang = currentLang.code" ng-model="nameLang" ng-options="each.code as each.name for (key, each) in languages"></select>
          </div>
        </div>
        
        <div class="form-group">
          <label class="col-md-3 control-label">{{ 'key' | translate }}</label>
          <div class="col-md-9">
            <input ng-model="form.key" type="text" class="form-control" placeholder="{{ 'type' | translate }}">
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
<div class="modal-footer">
  <button class="btn btn-warning" type="button" ng-click="$dismiss()">{{ 'cancel' | translate }}</button>
  <button class="btn btn-primary">{{ 'save' | translate }}</button>
</div>
</form>
