<div class="modal-header">
    <h3 class="modal-title">{{ 'files' | translate }}</h3>
</div>

<div class="modal-body">

    <div class="row">
        <div class="col-md-12">
            <h3>{{ 'user_files' | translate }}</h3>
            <table class="table table-responsive table-file-list">
                <tbody>
                <tr ng-repeat="file in files.user">
                    <td class="image-prev col-md-2">
                        <img class="img-responsive" src="{{file.minUrl}}">
                    </td>
                    <td class="file-name">
                        <a target="_blank" href="{{file.url}}" title="{{ 'view' | translate}}">
                            {{ file.name }}
                        </a>
                    </td>
                    <td class="file-size">{{ formatSizeUnits(file) }}</td>
                    <td class="file-remover">
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>

    <div class="row">
        <div class="col-md-12">
            <h3>{{ 'printing_house_files' | translate }}</h3>
            <table class="table table-responsive table-file-list">
                <tbody>
                <tr ng-repeat="file in files.admin">
                    <td class="image-prev col-md-2">
                        <img class="img-responsive" src="{{file.minUrl}}">
                    </td>
                    <td class="file-name">
                        <a target="_blank" href="{{file.url}}" title="{{ 'view' | translate}}">
                            {{ file.name }}
                        </a>
                    </td>
                    <td class="file-size">{{ formatSizeUnits(file) }}</td>
                    <td class="file-remover">
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>

    <div class="row">
        <div class="col-md-12">
            <form>
                <div class="form-group">
                    <label class="col-md-3 control-label">{{ 'add_files' | translate }}</label>
                    <div class="col-md-9">
                        <input ng-if="uploader" class="btn btn-sm btn-primary" type="file" multiple nv-file-select uploader="uploader"/>
                        <button ng-show="uploader.queue.length > 0" ng-click="upload()" class="btn btn-sm btn-success">{{ 'send' | translate }}</button>
                    </div>
                    <div class="col-md-offset-3 col-md-9">
                        <ul class="list-group">
                            <li  ng-repeat="item in uploader.queue" class="list-group-item">
                                <span ng-bind="item.file.name"></span>
                                <div class="pull-right">
                                    <span class="element-margin-right" ng-bind="formatSizeUnits(item.file.size)"></span>
                                    <button type="button" ng-click="removeFile(item)" class="btn btn-xs btn-danger">
                                        <i class="fa fa-times" aria-hidden="true"></i>
                                    </button>
                                </div>
                            </li>
                        </ul>
                        <div class="progress">
                            <div class="progress-bar" role="progressbar" aria-valuenow="{{ uploadProgress }}"
                                 aria-valuemin="0" aria-valuemax="100" style="width: {{uploadProgress}}%;">
                                <span class="text-center">{{uploadProgress}}%</span>
                            </div>
                        </div>
                    </div>
                </div>
            </form>

        </div>
    </div>

</div>

<div class="modal-footer">
    <button class="btn red-sunglo" type="button" ng-click="$dismiss()">{{ 'close' | translate }}</button>
</div>
