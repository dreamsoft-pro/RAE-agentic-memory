<div class="modal-header">
    <h3 class="modal-title">{{ 'edit_discount_group' | translate }}</h3>
</div>
<div class="modal-body">
    <div class="row">
        <div class="col-md-12">

            <form class="form-horizontal" role="form">
                <div class="form-group">
                    <label class="col-md-3 control-label">{{ 'percentage' | translate }}</label>
                    <div class="col-md-9">
                        <input ng-repeat="lang in languages" ng-show="nameLang == lang.code"
                               ng-model="form.langs[lang.code].name" type="text" class="form-control"
                               placeholder="{{lang.code}}"/>
                        <select class="form-control" ng-init="nameLang = currentLang.code"
                                ng-model="nameLang"
                                ng-options="each.code as each.name for (key, each) in languages"></select>
                    </div>
                </div>
                <div class="form-group">
                    <label class="col-md-3 control-label">{{ 'default' | translate }}</label>
                    <div class="col-md-9">
                        <input ng-model="form.default" ng-true-value="1" ng-false-value="0" type="checkbox"/>

                    </div>
                </div>
        </div>
            </form>

        </div>
    </div>
</div>
<div class="modal-footer">
    <button class="btn btn-warning" ng-click="$dismiss()">Cancel</button>
    <button class="btn btn-primary" ng-click="ok()">OK</button>
</div>
