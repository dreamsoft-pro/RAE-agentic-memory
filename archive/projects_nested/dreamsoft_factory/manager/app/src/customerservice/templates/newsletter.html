<div class="row">
    <div class="col-lg-12 col-md-12">
        <div class="portlet light">
            <div class="portlet-title">
                <div class="caption">
                    <i class="fa fa-male"></i> {{ 'newsletter' | translate }}
                </div>
            </div>
            <div class="portlet-body">
                <div class="overflowContainer">
                    <div>
                        <button ng-click="exportNewsletter()" class="btn btn-primary btn-sm">{{
                            'export in file' | translate }}
                        </button>
                    </div>
                    <table class="table table-striped table-hover">
                        <thead>
                        <tr role="row" class="heading">
                            <th width="5%" sort-trigger>#</th>
                            <th>{{ 'email' | translate }}</th>
                            <th>{{ 'domain_id' | translate }}</th>
                            <th>{{ 'agreement' | translate }}</th>
                            <th>{{ 'date' | translate }}</th>
                        </tr>
                        <tr role="row" class="filter">
                            <td>
                                <input type="text" class="form-control form-filter input-sm" placeholder="{{ 'id' | translate }}" ng-model="filterData.ID" ng-change="search()">
                            </td>
                            <td>
                                <input type="text" class="form-control form-filter input-sm" placeholder="{{ 'email' | translate }}" ng-model="filterData.email" ng-change="search()">
                            </td>
                            <td>
                                <input type="text" class="form-control form-filter input-sm" placeholder="{{ 'domain_id' | translate }}" ng-model="filterData.domainID" ng-change="search()">
                            </td>
                            <td></td>
                            <td></td>
                        </tr>
                        </thead>

                        <tbody>
                        <tr ng-repeat="newsletter in newsletters | filter:filterData">
                            <td>
                                {{ newsletter.ID }}
                            </td>
                            <td>
                                {{ newsletter.email }}
                            </td>
                            <td>
                                {{ newsletter.domainID }}
                            </td>
                            <td>
                                <span ng-if="newsletter.agreement == 1" style="color: green;">&#10004;</span>
                                <span ng-if="newsletter.agreement == 0" style="color: red;">&#10006;</span>
                            </td>
                            <td>
                                {{ newsletter.created }}
                            </td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>
