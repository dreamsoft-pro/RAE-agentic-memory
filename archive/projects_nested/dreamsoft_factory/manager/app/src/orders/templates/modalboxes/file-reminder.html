<div class="btn-success modal-header">
    <h3 class="modal-title">{{ 'reminder_about_files' | translate }}</h3>
</div>

<div class="modal-body">
	 {{ 'mails_sended' | translate }}: 
	 <ul>
	 <li ng-show="{{date != undefined}}" ng-repeat="date in fileReminds"> {{ date }}</li>
	 </ul>
</div>

<div class="modal-footer">
	<button ng-if="currentOrderRemindCount < 3" class="btn btn-success" type="button" ng-click="send()"><i class="fa fa-check" ></i> {{ 'send' | translate }}</button>
	<button class="btn red-sunglo" type="button" ng-click="cancel()">{{ 'close' | translate }}</button>
</div>
