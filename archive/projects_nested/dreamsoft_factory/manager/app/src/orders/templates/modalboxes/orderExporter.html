<div class="modal-header">
    <h3 class="modal-title">{{ 'export_orders' | translate }}</h3>
</div>

<form class="form-horizontal" role="form" ng-submit="exportOrder()">

    <div class="modal-body">
        <div class="form-body">

            <div class="form-group" style="width: 250px; padding: 20px;">
                {{ 'date_from' | translate }}<br>
                <div ng-model="dateStart" dp-datepicker></div>
                {{ 'date_to' | translate }}<br>
                <div ng-model="dateEnd" dp-datepicker></div>
            </div>
        </div>

    </div>
    <div class="modal-footer">
        <button class="btn red-sunglo" type="button" ng-click="$dismiss()">{{ 'close' | translate }}</button>
        <button class="btn btn-success"><i class="fa fa-download"></i> {{ 'export' | translate }}</button>
    </div>

</form>
