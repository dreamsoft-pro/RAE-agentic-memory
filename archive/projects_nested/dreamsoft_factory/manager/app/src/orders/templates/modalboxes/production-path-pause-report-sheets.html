<div class="modal-header">
    <h3 class="modal-title">{{ 'report_sheets' | translate }}: {{ task.name }} </h3>
</div>
<div class="modal-body">
    <div class="overflowContainer">
        <div class="portlet light" ng-repeat="n in [] | range: task.sheetsInfo.rangeSheets">
            <div class="portlet-title">
                <div class="caption">
                    {{ 'sheet' | translate }} {{n+1}}
                </div>
            </div>
            <div class="portlet-body">
                <div class="form-group">
                    <label class="col-md-3 control-label">{{ 'made_sheets_obverse' | translate }}</label>
                    <div class="col-md-9">
                        <input ng-model="task.madeSheets[n+1]" class="form-control input-obverse"
                            placeholder="{{ 'made_sheets' | translate }}" />
                    </div>
                </div>
                <div class="form-group" ng-if="task.doubleSidedSheet">
                    <label class="col-md-3 control-label">{{ 'made_sheets_reverse' | translate }}</label>
                    <div class="col-md-9">
                        <input ng-model="task.madeSheetsReverse[n+1]" class="form-control"
                            placeholder="{{ 'made_sheets' | translate }}" />
                    </div>
                </div>
            </div>
        </div>
    </div>
    <div class="form-actions">
        <div class="row" style="padding-right: 15px; text-align: right; margin: 0; margin-top: 15px;">
            <div class="col-md-12">
                <button ng-click="saveProgressTask(task);" class="btn btn-success">
                    <i class="fa fa-check"></i>
                    {{ 'save' | translate }}
                </button>
            </div>
        </div>
    </div>
</div>
</div>
