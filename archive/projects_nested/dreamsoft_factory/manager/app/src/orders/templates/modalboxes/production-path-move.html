<div class="modal-header">
    <h3 class="modal-title">
        {{ 'operation' | translate }}: {{ _.findWhere(operations, {ID: task.operationID}).name }}
    </h3>
</div>
<form class="form-horizontal" role="form" ng-submit="ok()">
    <div class="modal-body">
        <div class="form-body">
            <div class="form-group">
                <label class="col-md-3 control-label">{{ 'select_device' | translate }}</label>
                <div class="col-md-9">
                    <select class="form-control" ng-model="form.deviceID"
                            ng-options="each.ID as each.name for each in currentDevices">
                    </select>
                </div>
            </div>
        </div>
    </div>
    <div class="modal-footer">
        <button class="btn red-sunglo" type="button" ng-click="$dismiss()">{{ 'cancel' | translate }}</button>
        <button class="btn btn-success"><i class="fa fa-check"></i> {{ 'save' | translate }}</button>
    </div>
</form>
