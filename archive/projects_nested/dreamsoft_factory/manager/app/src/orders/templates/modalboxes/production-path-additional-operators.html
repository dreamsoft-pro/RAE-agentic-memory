<style>
.added{
    background: #dfba49;
}    
</style>
<script>
function mark(element){
    if(element.classList.contains("added")){
        element.classList.remove("added");
    }else{
        element.classList.add("added");
    }
}
</script>

<div class="modal-header">
    <h3 class="modal-title">{{ 'additional_operators' | translate }}: {{ task.name }} </h3>
</div>
<div class="modal-body">
    <div class="overflowContainer">
        <div style="display: flex; flex-flow: row wrap; justify-content: space-around;">
            <button ng-repeat="operator in taskOperators" onclick="mark(this)" style="margin-top: 10px; margin-right: 20px; font-weight: 600;" class="btn btn-lg" type="button" ng-click="addOperator(operator)">{{ operator.name }}</button>
        </div>
    </div>
</div>
<div class="modal-footer">
    <button class="btn red-sunglo" type="button" ng-click="$dismiss()">{{ 'close' | translate }}</button>
    <button class="btn btn-success" ng-click="save()"><i class="fa fa-check"></i> {{ 'start' | translate }}</button>
</div>
