<div class="modal-header">
    <h3 class="modal-title">{{ 'edit_status' | translate }}</h3>
</div>
<div class="modal-body" >
    <div class="row">
        <div class="col-md-12">

            <form class="form-horizontal" role="form">
                <div class="form-group">
                    <label class="col-md-3 control-label">{{ 'lang' | translate }}</label>
                    <div class="col-md-9">
                        <select class="form-control" ng-init="selectedLang = currentLang.code"
                                ng-model="selectedLang" ng-options="each.code as each.name for (key, each) in languages"></select>
                    </div>
                </div>
                <div class="form-group">
                    <label class="col-md-3 control-label">{{ 'name' | translate }}</label>
                    <div class="col-md-9">
                        <input ng-repeat="lang in languages" ng-show="selectedLang == lang.code"
                               ng-model="editForm.langs[lang.code].name"
                               type="text" class="form-control" placeholder="{{lang.code}}" >
                    </div>
                </div>

                <div class="form-group">
                    <label class="col-md-3 control-label"></label>
                    <div class="col-md-9">
                        <div class="checkbox-list">
                            <label>
                                <div class="checker">
                                    <span ng-class="{checked: editForm.active}">
                                        <input ng-model="editForm.active" type="checkbox">
                                    </span>
                                </div>
                                {{ 'active' | translate }}
                            </label>
                        </div>
                    </div>
                </div>

            </form>

        </div>
    </div>
</div>
<div class="modal-footer">
    <button class="btn btn-warning" ng-click="$dismiss()">Cancel</button>
    <button class="btn btn-primary" ng-click="ok()">OK</button>
</div>
