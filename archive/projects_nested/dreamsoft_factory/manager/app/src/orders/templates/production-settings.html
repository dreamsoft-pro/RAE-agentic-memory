<div class="row">

    <div class="col-lg-7 col-md-12">
            <div class="form-body">
                <div class="portlet light">
                    <div class="portlet-title">
                        <div class="caption">
                            {{ 'production_settings' | translate }}
                        </div>
                    </div>

                    <form class="form-horizontal" role="form" ng-submit="saveSettings()">
                        <div class="form-body">

                            <div class="form-group">
                                <label class="col-md-3 control-label">{{ 'raport_time_start_of_the_day' | translate }}
                                </label>
                                <div class="col-md-9">
                                    <input ng-model="form.raportTimeDayStart" type="time" class="form-control">
                                </div>
                            </div>

                            <div class="form-group">
                                <label class="col-md-3 control-label">{{ 'raport_time_end_of_the_day' | translate }}
                                </label>
                                <div class="col-md-9">
                                    <input ng-model="form.raportTimeDayEnd" type="time" class="form-control">
                                </div>
                            </div>

                            <div class="form-group">
                                <label class="col-md-3 control-label">{{ 'default_gantt_scale' | translate }}
                                </label>
                                <div class="col-md-9">
                                    <select ng-options="zoomOption.name as zoomOption.name for zoomOption in zoomOptions"
                                                            ng-model="form.defaultGanttScale" class="form-control"
                                                            required>
                                                    </select>
                                </div>
                            </div>
                        </div>
                        <div class="form-actions">
                            <div class="row">
                                <div class="col-md-offset-3 col-md-9">
                                    <button type="submit" class="btn btn-success"><i class="fa fa-check"></i> {{ 'save'
                                        |
                                        translate }}
                                    </button>
                                    <button ng-click="resetForm()" type="button" class="btn red-sunglo">{{ 'cancel' |
                                        translate }}
                                    </button>
                                </div>
                            </div>
                        </div>
                    </form>
                </div>
            </div>


    </div>
    <div class="col-lg-5 visible-lg">
        <div faq-accordion="printshop.productionSettings"></div>
    </div>

</div>

<div ui-view="shifts"></div>
