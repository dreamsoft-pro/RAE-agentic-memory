<div class="portlet light">
    <div class="portlet-title">
        <div class="caption">
            <i class="fa fa-cog"></i> {{ "option" | translate }}: {{ currentOptionName }}
            <span ng-if="allSelections && allSelections.length" class="badge" tooltip="{{allSelections.join(' /\n ')}}">{{ allSelections.length }}</span>
            <a ng-if="prevOption" ui-sref="printshop-configOptionSettings-exclusions({optID: prevOption})" class="prevNext"
               tooltip="{{ 'goto_previous_option' | translate }}"><i class="fa fa-arrow-circle-left"></i></a>
            <a ng-if="nextOption" ui-sref="printshop-configOptionSettings-exclusions({optID: nextOption})" class="prevNext"
               tooltip="{{ 'goto_next_option' | translate }}"><i class="fa fa-arrow-circle-right"></i></a>
        </div>
    </div>
</div>
<div ui-view="menu"></div>
<div class="row">
    <div class="col-md-12 col-lg-7">
        <div class="portlet light">
            <div class="portlet-body">

                <div class="row" data-ng-repeat="attr in attrsToExclusions">
                    <div class="col-md-12">
                        <div class="panel panel-success">
                            <div class="panel-heading clickable"
                                 ng-init="open = false"
                                 ng-click="open = (open === false ? true : false)">
                                {{ attr.ID }}
                                <b>{{attr.name}}</b>
                                <small> {{attr.adminName}}</small>
                                <span ng-if="attr.selectedChildren && attr.selectedChildren.length" class="badge pull-right" tooltip="{{attr.selectedChildren.join(' /\n ')}}">{{ attr.selectedChildren.length }}</span>
                                <button-select-all ng-if="open" data-id="{{attr.ID}}"></button-select-all>
                            </div>

                            <div class="list-group clickable" ng-show="exclusions[attr.ID] || open">
                                <a class="list-group-item"
                                   ng-repeat="option in allOptions[attr.ID]"
                                   ng-click="setExclusion(attr.ID, option.ID)"
                                   ng-class="{active: exclusions[attr.ID][option.ID]}">
                                    {{ option.ID }} <b>{{option.name}} </b>
                                    <small>{{option.adminName}}</small>
                                </a>
                            </div>

                        </div>
                    </div>

                </div>
                <div class="tools hidden-lg">
                    <button button-faq-accordion="printshop.configOptionsExclusions"></button>
                </div>
                <div class="fixedPositionSave" ng-if="exclusionsChange">
                    <button class="btn btn-success" ng-click="exclusionsSave()">
                        <i class="fa fa-check"></i> {{ 'save' | translate }}
                    </button>
                    <button class="btn red-sunglo" ng-click="exclusionsCancel()">
                        {{ 'cancel' | translate }}
                    </button>
                </div>

                <div class="clearfix"></div>

            </div>
        </div>
    </div>

    <div class="col-lg-5 visible-lg">
        <div faq-accordion="printshop.configOptionsExclusions"></div>
    </div>

</div>
