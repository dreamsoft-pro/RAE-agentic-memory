<div class="modal-header">
    <h3 class="modal-title">{{ 'edit' | translate }}</h3>
</div>

<form class="form-horizontal" role="form" ng-submit="save()">
    <div class="form-body">

        <div class="form-group">
            <label class="col-md-4 control-label">
                {{ 'select_from_list' | translate }}
            </label>
            <div class="col-md-8">
                <select ng-model="supplierMarginForm.supplierName" ng-options="label for label in suppliers" class="form-control">
                </select>
            </div>
        </div>

        <div class="form-group">
            <label class="col-md-4 control-label">{{ 'margin_percentage' | translate }}</label>
            <div class="col-md-8">
                <input ng-model="supplierMarginForm.percentage" type="number" step="any"
                       class="form-control" placeholder="{{ 'margin_percentage' | translate }}">
            </div>
        </div>

    </div>

    <div class="modal-footer">
        <button class="btn red-sunglo" type="button" ng-click="cancel()">{{ 'cancel' | translate }}</button>
        <button class="btn btn-success"><i class="fa fa-check"></i> {{ 'save' | translate }}</button>
    </div>

</form>
