<div class="modal-header">
    <h3 class="modal-title">{{ 'edit' | translate }}: {{department.name}}</h3>
</div>

<form class="form-horizontal" role="form" ng-submit="ok()">

    <div class="modal-body">
        <div class="form-body">

            <div class="form-group">
                <label class="col-md-3 control-label">{{ 'name' | translate }}</label>
                <div class="col-md-9">
                    <input ng-model="form.name" type="text" class="form-control" />
                </div>
            </div>

            <div class="form-group">
                <label class="col-md-3 control-label">
                    {{ 'color' | translate}}
                </label>
                <div class="col-md-9">
                    <input colorpicker="hex" ng-model="form.color" type="text" class="form-control"
                           placeholder="{{ 'color' | translate }}" />
                </div>
            </div>

        </div>

    </div>
    <div class="modal-footer">
        <button class="btn red-sunglo" type="button" ng-click="$dismiss()">{{ 'cancel' | translate }}</button>
        <button class="btn btn-success"><i class="fa fa-check"></i> {{ 'save' | translate }}</button>
    </div>

</form>
