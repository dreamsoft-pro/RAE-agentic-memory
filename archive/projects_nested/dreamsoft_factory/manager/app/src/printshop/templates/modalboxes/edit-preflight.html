<div class="modal-header">
	<h3 class="modal-title">{{ 'edit' | translate }}: {{ 'preflight' | translate }}: format id: {{preflightFolder.ID}}</h3>
</div>
<div class="modal-body">
	<form class="form-horizontal" role="form" ng-submit="save()">
		<div class="form-body">
			
			<table class="table table-striped">
				<thead>
					<tr>
						<th>#</th>
						<th>{{ 'name' | translate }}</th>
						<th>{{ 'folder_name' | translate }}</th>
						<th>{{ 'active' | translate }}</th>
					</tr>
				</thead>
				<tbody>
					<tr>
						<td>
							{{preflightFolder.ID}}
						</td>
						<td><input type="text" ng-model="form.name"></td>
						<td><input type="text" ng-model="form.folderName"></td>
						<td>
							<input type="checkbox" name="Aktywny" ng-true-value="1" ng-model="form.active">
						</td>
					</tr>
				</tbody>
			</table>
			
		</div>
		<div class="modal-footer">
			<button class="btn red-sunglo" type="button" ng-click="$dismiss()">{{ 'cancel' | translate }}</button>
			<button class="btn btn-success"><i class="fa fa-check"></i> {{ 'save' | translate }}</button>
		</div>
	</form>
</div>
