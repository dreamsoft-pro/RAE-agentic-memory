<div class="row">
    <div class="col-lg-7 col-md-12">
        <div class="portlet light">
            <div class="portlet-title">
                <div class="caption">
                    <i class="fa fa-hand-o-down"></i> {{ 'operations' | translate }}
                </div>

                <div class="tools hidden-lg">
                    <button button-faq-accordion="printshop.operations"></button>
                </div>

            </div>
            <div class="portlet-body">

                <div class="overflowContainer">
                    <table class="table table-striped table-hover">
                        <thead>
                        <tr role="row" class="heading">
                            <th>#</th>
                            <th>{{ 'name' | translate }}</th>
                            <th>{{ 'description' | translate }}</th>
                            <th>{{ 'actions' | translate }}</th>
                        </tr>
                        <tr role="row" class="filter">
                            <td>
                                <input type="text" class="form-control form-filter input-sm" placeholder="{{ 'id' | translate }}" ng-model="filterData.ID" ng-change="search()">
                            </td>
                            <td>
                                <input type="text" class="form-control form-filter input-sm" placeholder="{{ 'name' | translate }}" ng-model="filterData.name" ng-change="search()">
                            </td>
                            <td>
                                <input type="text" class="form-control form-filter input-sm" placeholder="{{ 'description' | translate }}" ng-model="filterData.description" ng-change="search()">
                            </td>
                            <td>
                            </td>
                        </tr>
                        </thead>
                        <tbody ui-sortable="sortableOptions" ng-model="operations">
                        <tr ng-repeat="operation in operations | filter:filterData">
                            <td class="noWrap verticalMiddle">
                                <button tooltip="Sort"
                                        class="btn btn-default btn-sm button-sort">
                                    <span class="fa fa-arrows-v"></span>
                                </button>
                                {{ operation.ID }}
                            </td>
                            <td>
                                {{ operation.name }}
                            </td>
                            <td>
                                {{ operation.description }}
                            </td>
                            <td class="text-left noWrap">
                                <button ng-click="edit(operation)"
                                        data-toggle="tooltip" data-container="body" tooltip="{{ 'edit' | translate }}"
                                        class="btn blue-hoki btn-xs">
                                    <span class="glyphicon glyphicon-edit"></span>
                                </button>
                                <button class="btn blue-madison btn-xs" ng-click="devices(operation)"
                                        tooltip="{{ 'select_devices_or_work_stations' | translate }}">
                                    {{ 'devices_or_work_stations' | translate }}
                                </button>
                                <button class="btn blue-madison btn-xs" ng-click="processes(operation)"
                                        tooltip="{{ 'assign_processes' | translate }}">
                                    {{ 'processes' | translate }}
                                </button>
                                <button ng-confirm-click="remove(operation.ID)"
                                        data-toggle="tooltip" data-container="body" tooltip="{{ 'delete' | translate }}"
                                        class="btn red-sunglo btn-xs">
                                    <span class="glyphicon glyphicon-remove"></span>
                                </button>
                            </td>
                        </tr>
                        </tbody>
                    </table>
                </div>

                <div class="fixedPositionSave" ng-show="sortChange">
                    <button class="btn btn-success" ng-click="sortSave()">
                        {{ 'save_the_change_order' | translate }}
                    </button>
                    <button class="btn red-sunglo" ng-click="sortCancel()">
                        {{ 'cancel' | translate }}
                    </button>
                </div>

                <form class="form-horizontal" role="form" ng-submit="add()">
                    <div class="form-body">
                        <div class="form-group">
                            <label class="col-md-3 control-label">{{ 'name' | translate }}</label>
                            <div class="col-md-9">
                                <input class="form-control" ng-model="form.name" placeholder="{{ 'name' | translate }}"
                                       required/>
                            </div>
                        </div>
                        <div class="form-group">
                            <label class="col-md-3 control-label">{{ 'description' | translate }}</label>
                            <div class="col-md-9">
                                <textarea class="form-control" ng-model="form.description"
                                          placeholder="{{ 'description' | translate }}"></textarea>
                            </div>
                        </div>
                        <div class="form-actions">
                            <div class="row">
                                <div class="col-md-offset-3 col-md-9">
                                    <button type="submit" class="btn btn-success"><i class="fa fa-plus"></i> {{ 'add' |
                                        translate }}
                                    </button>
                                    <button ng-click="reset()" type="button" class="btn red-sunglo">{{ 'cancel' |
                                        translate }}
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>
                </form>
            </div>
        </div>
    </div>
    <div class="col-lg-5 visible-lg">
        <div faq-accordion="printshop.operations"></div>
    </div>
</div>
