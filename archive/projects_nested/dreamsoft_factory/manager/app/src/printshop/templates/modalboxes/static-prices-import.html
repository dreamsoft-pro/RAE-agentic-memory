<div class="modal-header">
    <h3 class="modal-title">{{ 'import' | translate }}</h3>
</div>

<form class="form-horizontal" role="form" ng-submit="ok()">

    <div class="modal-body">
        <div class="form-body">
            <div class="form-group">
                <label class="col-md-3 control-label">Załaduj plik .xls</label>
                <div class="col-md-9">
                    <input nv-file-select uploader="uploader" type="file" class="form-control" placeholder="">
                </div>
            </div>
        </div>

    </div>
    <div class="modal-footer">
        <button class="btn red-sunglo" type="button" ng-click="$dismiss()">{{ 'close' | translate }}</button>
    </div>

</form>
