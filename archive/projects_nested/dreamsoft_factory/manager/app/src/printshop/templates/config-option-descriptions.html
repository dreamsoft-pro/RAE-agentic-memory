<div class="portlet light">
    <div class="portlet-title">
        <div class="caption">
            <i class="fa fa-cog"></i> {{ "option" | translate }}: {{ currentOptionName }}
            <a ng-if="prevOption" ui-sref="printshop-configOptionSettings-descriptions({optID: prevOption})" class="prevNext"
               tooltip="{{ 'goto_previous_option' | translate }}"><i class="fa fa-arrow-circle-left"></i></a>
            <a ng-if="nextOption" ui-sref="printshop-configOptionSettings-descriptions({optID: nextOption})" class="prevNext"
               tooltip="{{ 'goto_next_option' | translate }}"><i class="fa fa-arrow-circle-right"></i></a>
        </div>
    </div>
</div>
<div ui-view="menu"></div>
<div class="row">
    <div class="col-md-12 col-lg-7">
        <div class="portlet light">
            <div class="portlet-body">

                <div class="overflowContainer" >
                    <table class="table table-striped table-hover" ng-if="!!optionDescriptions.length" >
                        <thead>
                        <tr role="row" class="heading">
                            <th>{{ 'cecha' | translate }}</th>
                            <th>{{ 'value' | translate }}</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr ng-repeat="optionDescription in optionDescriptions">
                            <td>
                                {{ optionDescription.name|translate }}
                            </td>
                            <td>
                                <textarea ng-if="optionDescription.editor=='textarea'" ng-model="optionDescription.value" class="form-control" placeholder="{{ 'value' | translate }}">
                                </textarea>
                                <input  ng-if="optionDescription.editor!='textarea'" ng-model="optionDescription.value" class="form-control" placeholder="{{ 'value' | translate }}">
                            </td>
                        </tr>
                        </tbody>
                    </table>


                </div>

                <div class="form-actions">
                    <div class="row">
                        <div class="col-md-offset-3 col-md-9">
                            <button ng-click="save()" class="btn btn-success"> {{ 'save' | translate }}</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="col-lg-5 visible-lg">
        <div faq-accordion="printshop.configOptionDescription" ></div>
    </div>

</div>
