<div class="portlet light">
    <div class="portlet-title">
        <div class="caption">
            {{ "device_stand" | translate }}: {{deviceName}}
        </div>
    </div>
</div>
<div class="container-fluid">
    <div class="row">
        <div class="cols-xs-12">
            <ul class="nav nav-tabs nav-justified">
                <li ng-class="{active: $state.includes('printshop-production-path-device-efficiency')}">
                    <a ui-sref="printshop-production-path-device-efficiency({deviceID: deviceID})">
            {{"efficiency" | translate}}
          </a>
                </li>
                <li ng-class="{active: $state.includes('printshop-production-path-device-speed')}">
                    <a ui-sref="printshop-production-path-device-speed({deviceID: deviceID})">
            {{"speed_change" | translate}}
          </a>
                </li>
                <li ng-class="{active: $state.includes('printshop-production-path-device-prices')}">
                    <a ui-sref="printshop-production-path-device-prices({deviceID: deviceID})">
            {{"prices" | translate}}
          </a>
                </li>
                <li ng-class="{active: $state.includes('printshop-production-path-device-settings')}">
                    <a ui-sref="printshop-production-path-device-settings({deviceID: deviceID})">
            {{"settings" | translate}}
          </a>
                </li>
                <li ng-class="{active: $state.includes('printshop-production-path-device-services')}">
                    <a ui-sref="printshop-production-path-device-services({deviceID: deviceID})">
            {{"services" | translate}}
          </a>
                </li>
            </ul>
        </div>
