<div ui-view="productMenu"></div>
<div class="row">
  <div class="col-md-12">
    <div class="portlet light">
      <div class="portlet-title">
        <div class="caption">
          <i class="fa fa-align-justify"></i> {{ 'volumes' | translate }}
        </div>
        <div class="tools">
          <button button-faq-accordion="printshop.volumes"></button>
          <a href="javascript:;" ng-click="refresh()" class="reload">
          </a>
        </div>
      </div>
      <div class="portlet-body">
        <div class="overflowContainer">
          <table class="table table-striped table-hover">
            <thead>
              <tr role="row" class="heading">
                <th>#</th>
                <th>{{ 'volume' | translate }}</th>
                <th>{{ 'actions' | translate }}</th>
              </tr>
            </thead>
            <tbody>
              <tr ng-repeat="volume in volumes |orderBy: 'volume'">
                <td>
                  {{ volume.ID }}
                </td>
                <td>
                  {{ volume.volume }}
                </td>
                <td class="text-right">
                  <button data-ng-click="setInvisible(volume)"
                          data-toggle="tooltip" data-container="body" tooltip="{{ 'hidden' | translate }}"
                          class="btn btn-default btn-xs"
                          ng-class="{'btn-warning': volume.invisible}">
                    <i class="fa fa-eye-slash"></i>
                  </button>
                  <button data-ng-click="volumeFormats(volume)"
                          data-toggle="tooltip" data-container="body" tooltip="{{ 'formats' | translate }}"
                          class="btn btn-default btn-xs"
                          ng-class="{'btn-warning ': volume.formats.length > 0}">
                    <i class="fa fa-file-o"></i>
                  </button>
                  <button data-ng-click="rtDetails(volume)"
                          data-toggle="tooltip" data-container="body" tooltip="{{ 'realization_times' | translate }}"
                          class="btn blue-hoki btn-xs">
                    <i class="fa fa-calendar"></i>
                  </button>
                  <button ng-confirm-click="remove(volume)"
                          data-toggle="tooltip" data-container="body" tooltip="{{ 'delete' | translate }}"
                          class="btn red-sunglo btn-xs">
                    <span class="glyphicon glyphicon-remove"></span>
                  </button>
                </td>
              </tr>
            </tbody>
          </table>
        </div>  
              
        <div class="form-group">
          <label class="col-md-3 control-label"></label>
          <div class="col-md-9">
            <div class="checkbox-list">
              <label>
                <div class="checker"><span ng-class="{checked: customVolume}"><input ng-model="customVolume" ng-change="setCustomVolume()" type="checkbox"></span></div>{{ 'custom_volume' | translate }}
              </label>
            </div>
          </div>
        </div>
        <form ng-show="customVolume" class="form-horizontal" ng-submit="[setMaxVolume(),setStepVolume()]">
            <div class="form-group">
              <label class="col-md-3 control-label">{{ 'maximum_volume' | translate }}</label>
              <div class="col-md-5">
                <input type="text" class="form-control" ng-model="maxVolume"  placeholder="Zostaw pustę dla nieograniczonego nakładu" />
              </div>
            </div>
            <div>
              <label class="col-md-3 control-label">{{ 'step_volume' | translate }}</label>
                <div class="col-md-5">
                  <input type="text" class="form-control" value="1" ng-model="stepVolume"  placeholder="1" />
                </div>
            </div>
            <div class="col-md-4 form-group">
              <button type="submit" class="btn btn-success"><i class="fa fa-check"></i> {{ 'save' | translate }}</button>
            </div>
        </form>

        <div class="row">
          <div class="col-md-12">
            
            <div class="portlet light">
              <div class="portlet-title">
                <div class="caption font-green-haze col-md-3 text-right">
                     {{ 'add_new_fem' | translate }}
                </div>
              </div>
              <div class="portlet-body form">
                <form class="form-horizontal" role="form" ng-submit="add(form)">
                  <div class="form-body">
                    
                    <div class="form-group" ng-if="!form.range">
                      <label class="col-md-3 control-label">{{ 'volume' | translate }}</label>
                      <div class="col-md-5">
                        <input ng-model="form.volume" type="text" class="form-control" placeholder="{{ 'volume' | translate }}" required>
                      </div>
                    </div>
                    
                    
                  </div>
                  <div class="form-actions">
                    <div class="row">
                      <div class="col-md-offset-3 col-md-9">
                        <button type="submit" class="btn btn-success"><i class="fa fa-plus"></i> {{ 'add' | translate }}</button>
                        <button ng-click="resetForm()" type="button" class="btn red-sunglo">{{ 'cancel' | translate }}</button>
                      </div>
                    </div>
                  </div>
                </form>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
