<div class="modal-header">
  <h3 class="modal-title"> {{ 'add_models' | translate }}: </h3>
</div>




  <div class="modal-body">
  	<div class="row">
    <div class="col-md-12">
      <table class="table table-striped">
        <thead>
          <tr role="row" class="heading">
            <th>#</th>
            <th>
            	{{ 'file' | translate }}
            </th>
            <th>
              {{ 'format' | translate }}
            </th>
            <th>
              {{ 'language' | translate }}
            </th>
            <th>
              {{ 'actions' | translate }}
            </th>
          </tr>
        </thead>
        <tbody>
          <tr ng-repeat="pattern in patterns">
            <td>
            	{{ pattern.ID }}
            </td> 
            <td> 
              <a ng-click="urlLoad(pattern)"><img style="width:40px;" src="{{ pattern.patternIcon }}" /></a>
            </td>
            <td>
              {{ pattern.formatName }}
            </td>
            <td> 
              {{ pattern.lang }}
            </td>
            <td>
              <button class="btn red-sunglo btn-xs" href="javascript:;" ng-confirm-click="delete(pattern);" tooltip="{{ 'delete' | translate }}">
                <i class="glyphicon glyphicon-remove"></i>
              </button>
            </td>
          </tr>
        </tbody>
      </table>
     </div>
     </div>

    <div class="form-body">

      <form class="form-horizontal" role="form" ng-submit="save()">
      
      <div class="form-group">
        <label class="col-md-3 control-label">{{ 'lang' | translate }}</label>
        <div class="col-md-9">
          <select class="form-control" required ng-init="nameLang = currentLang.code" ng-model="form.lang" ng-options="each.code as each.name for (key, each) in langList"></select>
        </div>
      </div>

      <div class="form-group">
      	<label class="col-md-3 control-label">{{ 'format' | translate }}</label>
        <div class="col-md-9">
      		<select class="form-control" required ng-model="form.formatID" ng-options="format.ID as format.name for (key, format) in typeFormats"></select>
      	</div>
      </div>

      <div class="form-group">
      	<label class="col-md-3 control-label">{{ 'file' | translate }}</label>
        <div class="col-md-9">
      		<input class="form-control" type="file" ng-click="clearQueue()" nv-file-select="" uploader="uploader"  />
      	</div>
      </div>

      <div class="form-group">
      	<div class="col-md-3"></div>
      	<div class="col-md-9">
      		<div ng-repeat="item in uploader.queue">
      			<div class="col-md-4">
      				<strong>{{ item.file.name | limitTo: 10 }}</strong>
      				{{ item.file.size/1024/1024|number:2 }} MB
      			</div>
      			<div class="col-md-3" ng-show="uploader.isHTML5">
		            <div class="progress" style="margin-bottom: 0;">
		                <div class="progress-bar" role="progressbar" ng-style="{ 'width': item.progress + '%' }"></div>
		            </div>
		        </div>
		        <div class="col-md-5" ng-show="uploader.isHTML5">
                    <button type="button" class="btn btn-warning btn-xs" ng-click="item.cancel()" ng-disabled="!item.isUploading">
                        <span class="glyphicon glyphicon-ban-circle"></span> {{ 'cancel' | translate }}
                    </button>
                    <button type="button" class="btn btn-danger btn-xs" ng-click="item.remove()">
                        <span class="glyphicon glyphicon-trash"></span> {{ 'remove' | translate }}
                    </button>
		        </div>
      		</div>
      	</div>
      </div>

        <div class="modal-footer">
          <button class="btn red-sunglo" type="button" ng-click="cancel()">{{ 'cancel' | translate }}</button>
          <button class="btn btn-success"><i class="fa fa-check"></i> {{ 'add_mockup' | translate }}</button>
        </div>

      </form>

    </div>
  </div>
