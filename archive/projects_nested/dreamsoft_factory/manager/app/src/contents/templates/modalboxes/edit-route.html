<div class="modal-header">
  <h3 class="modal-title">{{ 'Edit' | translate }}: {{ 'route' | translate }} {{form.state}}</h3>
</div>
<form class="form-horizontal" role="form" ng-submit="save()">
  <div class="modal-body">
    
    <div class="form-body">
      <div class="form-group">
        <label class="col-md-3 control-label">{{ 'parent' | translate }}</label>
        <div class="col-md-9">
          <select ng-model="form.parentID" type="text" class="form-control" ng-options="route.ID as route.state for route in routesList" value="form.parentID">
            <option value="">{{ 'root' | translate }}</option>
          </select>
        </div>
      </div>
      <div class="form-group">
        <label class="col-md-3 control-label">{{ 'state' | translate }} ( {{ 'root_name' | translate }})</label>
        <div class="col-md-9">
          <input value="{{ form.state }}" ng-model="form.state" type="text" class="form-control" placeholder="">
        </div>
      </div>
      <div class="form-group">
        <label class="col-md-3 control-label">{{ 'name' | translate }}</label>
        <div class="col-md-9">
          <input value="{{ form.name }}" ng-model="form.name" type="text" class="form-control" placeholder="">
        </div>
      </div>
      <div class="form-group">
        <label class="col-md-3 control-label">{{ 'url_name' | translate }}</label>
        <div class="col-md-9">
          <input ng-repeat="lang in languages" ng-show="nameLang == lang.code" ng-model="form.langNames[lang.code]" type="text" class="form-control" placeholder="{{lang.code}}">
        <select class="form-control" ng-init="nameLang = currentLang.code" ng-model="nameLang" ng-options="each.code as each.name for (key, each) in languages"></select>
      </div>
    </div>
    <div class="form-group">
        <label class="col-md-3 control-label">{{ 'url_address' | translate }}</label>
        <div class="col-md-9">
          <input ng-repeat="lang in languages" ng-show="nameLang == lang.code" ng-model="form.langUrls[lang.code]" type="text" class="form-control" placeholder="{{lang.code}}">
        <select class="form-control" ng-init="nameLang = currentLang.code" ng-model="nameLang" ng-options="each.code as each.name for (key, each) in languages"></select>
      </div>
    </div>
    <div class="form-group">
        <label class="col-md-3 control-label">{{ 'controller' | translate }}</label>
        <div class="col-md-9">
          <input ng-model="form.controller" type="text" class="form-control" placeholder="{{lang.controller}}">
      </div>
    </div>
    <div class="form-group">
        <label class="col-md-3 control-label"></label>
        <div class="col-md-9">
          <div class="checkbox-list">
            <label>
              <div class="checker">
                <span ng-class="{checked: !!parseInt(form.abstract)}">
                  <input ng-model="form.abstract" ng-true-value="1" ng-false-value="0" type="checkbox">
                </span>
              </div>
              {{ 'abstract' | translate }}
            </label>
          </div>
        </div>
      </div>
      <div class="form-group">
        <label class="col-md-3 control-label"></label>
        <div class="col-md-9">
          <div class="checkbox-list">
            <label>
              <div class="checker">
                <span ng-class="{checked: !!parseInt(form.skipBreadcrumb)}">
                  <input ng-model="form.skipBreadcrumb" ng-true-value="1" ng-false-value="0" type="checkbox">
                </span>
              </div>
              {{ 'skip_breadcrumb' | translate }}
            </label>
          </div>
        </div>
      </div>
  </div>
  
</div>
<div class="modal-footer">
  <button class="btn red-sunglo" type="button" ng-click="cancel()">{{ 'cancel' | translate }}</button>
  <button class="btn btn-success"><i class="fa fa-check"></i> {{ 'save' | translate }}</button>
</div>
</form>
