<div class="modal-header">
    <h3 class="modal-title">{{ 'edit' | translate }}: {{ 'category' | translate }} ID: {{form.ID}}</h3>
</div>
<form class="form-horizontal" role="form" ng-init="initModal()" ng-submit="save()">
    <div class="modal-body">

        <div class="form-body">

            <div class="form-group">
                <label class="col-md-3 control-label">{{ 'key' | translate }}</label>
                <div class="col-md-9">
                    <input ng-model="form.key" type="text" class="form-control"
                           placeholder="{{ 'key' | translate }}">
                </div>
            </div>

            <div class="form-group">
                <label class="col-md-3 control-label">
                    {{ 'content' | translate }}
                    <br>
                </label>
                <div class="col-md-9">
                    <div ng-repeat="lang in languages" ng-show="nameLang == lang.code">
                        <textarea ds-tinymce style="width:100%;" rows="20"
                                  ng-model="form.contents[lang.code]"></textarea>
                    </div>
                    <select class="form-control" ng-init="nameLang = currentLang.code" ng-model="nameLang"
                            ng-options="each.code as each.name for (key, each) in languages"></select>
                </div>
            </div>

            <div class="form-group">
                <label class="col-md-3 control-label">{{ 'active' | translate }}</label>
                <div class="col-md-9">
                    <input class="toggle bootstrap-switch-active" ng-model="form.active"
                           ng-value="form.active" type="checkbox">
                </div>
            </div>

            <div class="form-group">
                <label class="col-md-3 control-label">{{ 'diffrent_for_domain' | translate }}</label>
                <div class="col-md-9">
                    <input class="toggle bootstrap-switch-forDomain" ng-model="form.forDomain"
                           ng-value="form.forDomain" type="checkbox">
                </div>
            </div>

        </div>

    </div>

    </div>
    <div class="modal-footer">
        <button class="btn red-sunglo" type="button" ng-click="cancel()">{{ 'cancel' | translate }}</button>
        <button class="btn btn-success"><i class="fa fa-check"></i> {{ 'save' | translate }}</button>
    </div>
</form>
