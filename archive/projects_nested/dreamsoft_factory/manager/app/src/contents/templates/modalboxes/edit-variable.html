<div class="modal-header">
    <h3 class="modal-title">{{ 'edit' | translate }} {{variable.name}}</h3>
</div>

<form class="form-horizontal" role="form" ng-submit="save()">

  <div class="modal-body">
    <div class="form-body">
      <div class="form-group">
                    <label class="col-md-3 control-label">{{ 'name' | translate }}</label>
                    <div class="col-md-9">
                      <input ng-model="form.name" type="text" class="form-control" placeholder="{{ 'name' | translate }}">
                    </div>
                  </div>
                  <div class="form-group">
                    <label class="col-md-3 control-label">{{ 'function' | translate }}</label>
                    <div class="col-md-9">
                      <input ng-model="form.function" type="text" class="form-control" placeholder="{{ 'function' | translate }}">
                    </div>
                  </div>
                  <div class="form-group">
                    <label class="col-md-3 control-label">{{ 'description' | translate }}</label>
                    <div class="col-md-9">
                      <input ng-repeat="lang in languages" ng-show="nameLang == lang.code" ng-model="form.langs[lang.code]" type="text" class="form-control" placeholder="{{lang.code}}" >
                    <select class="form-control" ng-init="nameLang = currentLang.code" ng-model="nameLang" ng-options="each.code as each.name for (key, each) in languages"></select>
                  </div>
    </div>
  </div>
  <div class="modal-footer">
    <button class="btn red-sunglo" type="button" ng-click="$dismiss()">{{ 'cancel' | translate }}</button>
    <button class="btn btn-success"><i class="fa fa-check"></i> {{ 'save' | translate }}</button>
  </div>

</form>
