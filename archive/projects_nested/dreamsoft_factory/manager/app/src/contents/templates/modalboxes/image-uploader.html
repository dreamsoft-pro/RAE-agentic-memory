<div class="modal-header">
    <h3 class="modal-title">{{ 'upload' | translate }}</h3>
</div>

<form class="form-horizontal" role="form" ng-submit="ok()">

    <div class="modal-body">
        <div class="form-body">

            <div class="form-group">
                <label class="col-md-3 control-label">{{ 'load_file' | translate }}</label>
                <div class="col-md-9">
                    <input nv-file-select uploader="uploader" type="file" class="form-control" placeholder="">
                </div>
            </div>

            <div class="form-group">
                <div class="col-md-12">
                    <div class="progress">
                        <div class="progress-bar progress-bar-success"
                             role="progressbar"
                             aria-valuenow="{{ file.progress }}"
                             aria-valuemin="0" aria-valuemax="100"
                             style="width: {{ file.progress }}%">
                        </div>
                    </div>
                </div>
            </div>

        </div>

    </div>

    <div class="modal-footer">
        <button class="btn red-sunglo" type="button" ng-click="$dismiss()">{{ 'close' | translate }}</button>
        <button class="btn btn-success"><i class="fa fa-check"></i> {{ 'upload' | translate }}</button>
    </div>

</form>
