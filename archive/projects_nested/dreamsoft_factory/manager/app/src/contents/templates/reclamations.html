<div class="row">
    <div class="col-md-12">
        <div class="portlet light">
            <div class="portlet-title">
                <div class="caption">
                    <i class="fa fa-edit"></i>
                    {{ 'reclamations' | translate }}
                    <span class="small">({{ 'list_of_possible_damages' | translate }})</span>
                </div>
            </div>
            <div class="portlet-body">
                <div class="overflowContainer">
                    <table class="table table-striped table-hover">
                        <thead>
                        <tr role="row" class="heading">
                            <th>#</th>
                            <th>{{ 'key' | translate }}</th>
                            <th>
                                <select ng-model="showLang"
                                        ng-options="lang.code as lang.name for (key, lang) in languages"
                                        ng-init="showLang = currentLang.code"></select>
                                <br>
                                {{ 'description' | translate }}
                            </th>
                            <th class="text-right">
                                {{ 'actions' | translate }}
                            </th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr ng-repeat="fault in faults">
                            <td>{{ fault.ID }}</td>
                            <td>{{ fault.key }}</td>
                            <td>{{ fault.descriptions[showLang].name }}</td>
                            <td class="text-right">
                                <button class="btn btn-xs btn-success" type="button" ng-click="edit(fault)">
                                    <span class="glyphicon glyphicon-edit"></span>
                                </button>
                                <button class="btn btn-xs btn-danger" type="button" ng-confirm-click="remove(fault)">
                                    <i class="glyphicon glyphicon-remove"></i>
                                </button>
                            </td>
                        </tr>
                        </tbody>
                    </table>
                </div>

                <div class="row">
                    <div class="col-md-12">

                        <div class="portlet light">
                            <div class="portlet-title">
                                <div class="caption">
                                    <i class="fa fa-gift"></i>
                                    {{ 'add' | translate }}
                                </div>
                            </div>
                            <div class="portlet-body form">
                                <form class="form-horizontal" role="form" ng-submit="add()">
                                    <div class="form-body">

                                        <div class="form-group">
                                            <label class="col-md-3 control-label">{{ 'key' | translate }}</label>
                                            <div class="col-md-9">
                                                <input ng-model="form.key" type="text" class="form-control"
                                                       placeholder="{{ 'key' | translate }}">
                                            </div>
                                        </div>

                                        <div class="form-group">
                                            <label class="col-md-3 control-label">{{ 'description' | translate
                                                }}</label>
                                            <div class="col-md-9">
                                                <textarea placeholder="{{ showLang }}" class="form-control"
                                                          ng-repeat="lang in languages"
                                                          ng-show="showLang == lang.code"
                                                          ng-model="form.descriptions[lang.code]"></textarea>
                                                <select class="form-control" ng-init="showLang = currentLang.code"
                                                        ng-model="showLang"
                                                        ng-options="each.code as each.name for (key, each) in languages"></select>
                                            </div>
                                        </div>

                                    </div>
                                    <div class="form-actions">
                                        <div class="row">
                                            <div class="col-md-offset-3 col-md-9">
                                                <button type="submit" class="btn btn-success"><i class="fa fa-plus"></i>
                                                    {{ 'add' | translate }}
                                                </button>
                                                <button ng-click="resetForm()" type="button" class="btn red-sunglo">{{
                                                    'cancel' | translate }}
                                                </button>
                                            </div>
                                        </div>
                                    </div>
                                </form>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
