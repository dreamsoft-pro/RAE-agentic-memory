<form class="form-horizontal" role="form" ng-submit="save()">
	<div class="modal-body">
	    <div class="form-body">
	    	<div class="form-group">
	    		<div class="col-md-12">
					<img class="img-responsive" src="{{ linkToBannerImg }}"/>
			</div>  	
		</div>
	    <div class="form-group">
		    <label class="col-md-3 control-label">{{ 'link_to_banner' | translate }}</label>
		    <div class="col-md-9">
          		<input value="{{ currentLink }}" ng-model="form.bannerLink" type="text" class="form-control" placeholder="">
        	</div>
      	</div>
		</div>
	</div>
	<div class="modal-footer">
		<button class="btn red-sunglo" type="button" ng-click="cancel()">{{ 'cancel' | translate }}</button>
		<button class="btn btn-success"><i class="fa fa-check"></i> {{ 'save' | translate }}</button>
	</div>
</form>
