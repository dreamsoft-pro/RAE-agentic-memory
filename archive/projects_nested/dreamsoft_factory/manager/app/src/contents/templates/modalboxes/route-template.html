<div class="modal-header">
	<h3 class="modal-title">{{ 'templates_for' | translate }} {{ route.state }}</h3>
</div>
<div class="modal-body">
	<div class="row">
		<div class="col-md-12">
			<table class="table table-striped">
				<thead>
					<tr>
						<th>#</th>
						<th>{{ 'name' | translate }}</th>
						<th>{{ 'url_address' | translate }}</th>
						<th>{{ 'actions' | translate }}</th>
					</tr>
				</thead>
				<tbody>
					<tr ng-repeat="routeTemplate in routeTemplates">
						<td>
							{{routeTemplate.ID}}
						</td>
						<td>{{routeTemplate.name}}</td>
						<td>{{routeTemplate.state}}</td>
						<td>
							<!-- <button ng-click="edit(template)"
							data-toggle="tooltip" data-container="body"
							class="btn btn-primary btn-sm">
							<span class="glyphicon glyphicon-edit"></span>
							</button> -->
							<button
							ng-confirm-click="remove(routeTemplate)"
							data-toggle="tooltip" data-container="body" title="{{langArr.delete}}"
							class="btn btn-danger btn-xs">
							<span class="glyphicon glyphicon-remove"></span>
							</button>
						</td>
					</tr>
				</tbody>
			</table>
			<form class="form-horizontal" role="form" ng-submit="ok()">
				<div class="form-body">
					<div class="form-group">
						<label class="col-md-3 control-label">{{ 'templates' | translate }}</label>
						<div class="col-md-9">
							<select ng-model="form.templateID" type="text" class="form-control" ng-options="template.ID as template.name for template in templates" >
								<option value="">{{ 'select' | translate }}</option>
							</select>
						</div>
					</div>
					<div class="form-group">
						<div class="col-md-9 col-md-offset-3">
							<button class="btn btn-success" type="submit"><i class="fa fa-plus"></i> {{ 'add' | translate }}</button>
							<button class="btn red-sunglo" type="button" ng-click="form={}">{{ 'cancel' | translate }}</button>
						</div>
					</div>
				</div>
			</form>
			<div class="modal-footer">
				<button class="btn btn-default" ng-click="$dismiss()"><i class="fa fa-check"></i> {{ 'close' | translate }}</button>
			</div>
		</div>
	</div>
</div>
