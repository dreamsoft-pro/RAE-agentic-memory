<div class="row">
    <div class="col-md-12">
        <div class="portlet light">
            <div class="portlet-title">
                <div class="caption">
                    <i class="fa fa-edit"></i>{{'import-export-translations' | translate}}
                </div>
            </div>
            <div class="portlet-body form">
                <form class="form-horizontal" role="form" ng-submit="exportLang()">
                    <div class="form-body">

                        <div class="form-group">
                            <label class="col-md-3 control-label">{{'exported-language' | translate}}</label>
                            <div class="col-md-9">
                                <select ng-model="form.exportLang"
                                        ng-options="each.code as each.name for each in langlist"
                                        class="form-control"></select>
                            </div>
                        </div>

                    </div>
                    <div class="form-actions">
                        <div class="row">
                            <div class="col-md-offset-3 col-md-9">
                                <button type="submit" class="btn btn-success"> {{ 'export' | translate }}</button>
                            </div>
                        </div>
                    </div>
                </form>
                <form class="form-horizontal" role="form" ng-submit="importLang()">
                    <div class="form-body">
                        <div class="form-group">
                            <label class="col-md-3 control-label">{{'spreadsheet' | translate}}</label>
                            <div class="col-md-9">
                                <input nv-file-select uploader="uploader" type="file" class="form-control"
                                       placeholder="">
                            </div>
                        </div>
                        <div class="form-group">
                            <label class="col-md-3 control-label">{{'import_to_language' | translate}}</label>
                            <div class="col-md-9">
                                <select ng-model="form.importLang"
                                        ng-options="each.code as each.name for each in langlist"
                                        class="form-control"></select>
                            </div>
                        </div>
                    </div>

                    <div class="form-actions">
                        <div class="row">
                            <div class="col-md-offset-3 col-md-9">
                                <button type="submit" class="btn btn-success"> {{ 'import' | translate }}</button>
                            </div>
                        </div>
                    </div>

                </form>
            </div>
        </div>
    </div>
</div>
