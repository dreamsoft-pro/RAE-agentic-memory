<div class="modal-header">
    <h3 class="modal-title">{{ 'assign_variable' | translate}}</h3>
</div>
<div class="modal-body">
    <div class="row">
        <div class="col-md-12">
            <table class="table table-striped table-hover">
                <thead>
                <tr role="row" class="heading">
                    <th>{{ 'variable_name' | translate }}</th>
                    <th>{{ 'template' | translate }}</th>
                    <th>{{ 'value' | translate }}</th>
                </tr>
                </thead>
                <tbody>
                <tr ng-repeat="tv in templateVariables">
                    <td>{{tv.name}}</td>
                    <td>{{tv.templateName}}</td>
                    <td>{{tv.value}}</td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
    <div class="form-actions">
        <div class="row">
            <div class="col-md-offset-3 col-md-9">
                <button ng-click="add()" type="submit" class="btn btn-success"></i>
                    {{ 'add' | translate }}
                </button>
                <button ng-click="cancel()" type="button" class="btn red-sunglo">{{
                    'finish' | translate }}
                </button>
            </div>
        </div>
    </div>
    </form>
</div>
