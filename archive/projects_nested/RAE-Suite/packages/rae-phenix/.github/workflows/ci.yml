name: Feniks CI/CD

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      qdrant:
        image: qdrant/qdrant:latest
        ports:
          - 6333:6333
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
    - uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install Node dependencies
      run: npm install

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e ".[dev]"
        playwright install --with-deps

    - name: Lint with ruff
      run: |
        ruff check feniks/ --output-format=github

    - name: Type check with mypy
      run: |
        mypy feniks/ --ignore-missing-imports --no-error-summary
      continue-on-error: true  # Nie blokuj buildu na type errors (TODO: naprawić w przyszłości)

    - name: Run tests with pytest
      run: |
        pytest --cov=feniks --cov-report=xml --cov-report=term-missing --junitxml=junit.xml
      env:
        QDRANT_HOST: localhost
        QDRANT_PORT: 6333
        FENIKS_PROFILE: test
        RAE_ENABLED: false

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v4
      with:
        file: ./coverage.xml
        fail_ci_if_error: false
        verbose: true
      env:
        CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

    - name: Upload test results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: test-results-${{ matrix.python-version }}
        path: |
          junit.xml
          htmlcov/

  security:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"

    - name: Install Bandit
      run: |
        pip install bandit[toml]

    - name: Run Bandit security scan
      run: |
        bandit -r feniks/ -f json -o bandit-report.json || true

    - name: Upload security report
      uses: actions/upload-artifact@v4
      with:
        name: bandit-security-report
        path: bandit-report.json

  lint:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"

    - name: Install linting tools
      run: |
        pip install ruff black isort

    - name: Check code formatting with black
      run: |
        black --check feniks/ tests/

    - name: Check import sorting with isort
      run: |
        isort --check-only feniks/ tests/

    - name: Lint with ruff
      run: |
        ruff check feniks/ tests/

  build:
    runs-on: ubuntu-latest
    needs: [test, security, lint]
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"

    - name: Install build tools
      run: |
        pip install build

    - name: Build package
      run: |
        python -m build

    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: dist-package
        path: dist/
